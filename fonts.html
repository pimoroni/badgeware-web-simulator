  <link rel="modulepreload" href="simulator/ppf.js">
  <link rel="modulepreload" href="simulator/explorer.js">
</head>
<body class="fonts-page">

    <a class="buy" href="https://badgewa.re/buy">Buy</a>

</nav>

<div id="toolbar" role="toolbar" aria-label="Playground">
  <span class="toolbar-title">Playground</span>
  <a class="navbtn" href="examples.html" title="Example gallery"><span class="material-symbols-outlined">grid_view</span><span class="label">Examples</span></a>
  <a class="navbtn" href="apps.html" title="Apps"><span class="material-symbols-outlined">apps</span><span class="label">Apps</span></a>
  <a class="navbtn" href="index.html" title="Open editor"><span class="material-symbols-outlined">code</span><span class="label">Editor</span></a>
  <button class="navbtn active" aria-current="page" title="Font Explorer"><span class="material-symbols-outlined">font_download</span><span class="label">Font Explorer</span></button>
</div>

<div id="controls">
  <input id="specimen-input" type="text" placeholder="Type to preview your own text…" aria-label="Specimen text">
  <div id="res-tabs" role="tablist" aria-label="Badge screen resolution">
    <button data-res="hires" class="active" title="320×240">HIRES</button>
    <button data-res="lores" title="160×120">LORES</button>
  </div>
  <div class="control-group">
    <span class="material-symbols-outlined" title="Zoom">format_size</span>
    <input id="size-input" type="range" min="1" max="4" step="0.1" value="1" aria-label="Preview zoom (multiplier)">
    <span class="val" id="size-val">1×</span>
  </div>
  <div id="filter-tabs" role="tablist" aria-label="Filter fonts">
    <button data-filter="all" class="active">All</button>
    <button data-filter="vector">Vector</button>
    <button data-filter="pixel">Pixel</button>
  </div>
</div>
</header>

<main id="workspace">
  <div id="loading">Loading fonts…</div>
</main>

<!-- Detail modal: big specimen, metadata, code snippet, and download. -->
<div id="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="modal-name">
  <div id="modal">
    <div id="modal-header">
      <span class="name" id="modal-name"></span>
      <span class="badge" id="modal-badge"></span>
      <button class="close" id="modal-close" aria-label="Close"><span class="material-symbols-outlined">close</span></button>
    </div>
    <div id="modal-body">
      <div id="modal-specimen"></div>
      <div class="dims-row" id="modal-dims"></div>

      <div class="modal-section-title">Load it on your badge</div>
      <div class="code-block">
        <button class="copy-btn" id="modal-copy"><span class="material-symbols-outlined">content_copy</span>Copy</button>
        <pre id="modal-code"></pre>
      </div>

      <div class="modal-actions">
        <button class="btn primary" id="modal-download"><span class="material-symbols-outlined">download</span>Download font</button>
      </div>
    </div>
  </div>
</div>

<script type="module" src="simulator/explorer.js"></script>
</body>
</html>
