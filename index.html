<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Badgeware Simulator</title>
  <script type="importmap">
  {
    "imports": {
      "three":          "https://cdn.jsdelivr.net/npm/three@0.172.0/build/three.module.min.js",
      "three/addons/":  "https://cdn.jsdelivr.net/npm/three@0.172.0/examples/jsm/"
    }
  }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;700&display=swap" crossorigin>
  <style>
    :root {
      --bg:          rgb(10, 20, 30);
      --panel:       rgba(20, 30, 40, 0.6);
      --border:      rgba(180, 190, 200, 0.12);
      --white:       rgba(235, 245, 255);
      --faint:       rgba(180, 190, 200);
      --orange:      rgb(224, 137, 32);
      --green:       rgb(32, 224, 70);
      --blue:        rgb(32, 189, 224);
      --faint-orange:rgba(224, 137, 32, 0.15);
      --faint-green: rgba(32, 224, 70,  0.12);
      --faint-white: rgba(235, 245, 255, 0.5);
      --dim:         rgba(180, 190, 200, 0.4);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: Lexend, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      font-weight: 300;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Toolbar ─────────────────────────────────────────────────── */
    #toolbar {
      background: rgba(10, 20, 30, 0.85);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(1rem);
      padding: 6px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      user-select: none;
    }

    #run-btn {
      background: var(--orange);
      color: rgb(10, 20, 30);
      border: none;
      padding: 4px 14px 4px 10px;
      font-size: 12px;
      font-weight: 700;
      font-family: inherit;
      border-radius: 0.4rem;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: filter 0.1s;
    }
    #run-btn:hover  { filter: brightness(1.15); }
    #run-btn:active { filter: brightness(0.9); }

    #example-select {
      background: var(--panel);
      color: var(--white);
      border: 1px solid var(--border);
      padding: 4px 8px;
      font-size: 12px;
      font-family: inherit;
      font-weight: 300;
      border-radius: 0.4rem;
      cursor: pointer;
    }
    #example-select:focus { outline: 1px solid var(--orange); }

    #status {
      margin-left: auto;
      font-size: 11px;
      color: var(--dim);
    }

    /* ── Main layout ─────────────────────────────────────────────── */
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Editor panel ────────────────────────────────────────────── */
    #editor-panel {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Tab bar ─────────────────────────────────────────────────── */
    #tab-bar {
      height: 33px;
      display: flex;
      align-items: stretch;
      overflow-x: auto;
      overflow-y: hidden;
      background: rgba(6, 14, 22, 0.95);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #tab-bar::-webkit-scrollbar { height: 0; }

    .tab {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 0 8px 0 12px;
      font-size: 12px;
      color: var(--dim);
      cursor: pointer;
      border-right: 1px solid var(--border);
      white-space: nowrap;
      flex-shrink: 0;
      max-width: 180px;
      transition: color 0.1s, background 0.1s;
      user-select: none;
      position: relative;
    }
    .tab:hover { color: var(--faint); background: rgba(235,245,255,0.03); }
    .tab.active {
      color: var(--white);
      background: var(--bg);
      border-bottom: 2px solid var(--orange);
      margin-bottom: -1px;
    }
    /* dot for unsaved scratch tabs */
    .tab.dirty .tab-name::after {
      content: '●'; font-size: 7px; color: var(--orange);
      margin-left: 4px; vertical-align: super;
    }
    .tab-name { flex: 1; overflow: hidden; text-overflow: ellipsis; }
    .tab.transient .tab-name { font-style: italic; }
    .tab-readonly { font-size: 9px; color: var(--dim); margin-left: 2px; }

    .tab-close {
      background: none; border: none;
      color: inherit; opacity: 0;
      cursor: pointer; font-size: 10px;
      line-height: 1; padding: 2px 3px;
      border-radius: 2px; flex-shrink: 0;
    }
    .tab:hover .tab-close { opacity: 0.4; }
    .tab-close:hover { opacity: 1 !important; background: rgba(235,245,255,0.1); }

    #editor {
      flex: 1;
      min-height: 0;
    }

    /* ── Image preview (shown instead of #editor for image tabs) ─── */
    #img-preview {
      display: none;
      flex: 1;
      min-height: 0;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 20px;
      background: rgba(0,0,0,0.25);
    }
    #img-preview img {
      max-width: 100%;
      max-height: calc(100% - 40px);
      object-fit: contain;
      image-rendering: pixelated;
    }
    .img-meta {
      display: flex;
      gap: 16px;
      font-size: 11px;
      color: var(--dim);
    }

    /* ── Resize handle ───────────────────────────────────────────── */
    #resize-handle {
      width: 4px;
      flex-shrink: 0;
      background: var(--border);
      cursor: col-resize;
      transition: background 0.15s;
      position: relative;
    }
    /* Widen the hit area without changing the visual strip */
    #resize-handle::after {
      content: '';
      position: absolute;
      inset: 0 -4px;
    }
    #resize-handle:hover,
    #resize-handle.dragging { background: rgba(224, 137, 32, 0.5); }

    /* Transparent overlay absorbs pointer events from Monaco + canvas during drag */
    #drag-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      cursor: col-resize;
    }
    #drag-overlay.active { display: block; }

    /* ── Side panel ──────────────────────────────────────────────── */
    #side-panel {
      width: 342px;
      flex-shrink: 0;
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      background: var(--panel);
      overflow: hidden;
    }

    /* ── Simulator ───────────────────────────────────────────────── */
    #simulator-wrap {
      padding: 12px;
      border-bottom: 1px solid var(--border);
      background: rgba(10, 20, 30, 0.6);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    #sim-label {
      font-size: 10px;
      font-weight: 400;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    #badge-3d-wrap {
      flex: 1;
      min-width: 0;
      aspect-ratio: 4 / 3;
      background: transparent;
      position: relative;
      overflow: hidden;
    }

    #badge-3d-wrap > canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    #badge-3d-wrap > canvas:focus {
      outline: 2px solid var(--orange);
      outline-offset: -2px;
    }

    /* Simulator host stays composited so the OffscreenCanvas renders and
       CanvasTexture reads succeed. Opacity near-zero keeps it invisible. */
    .badgeware-simulator {
      position: fixed;
      bottom: 0;
      right: 0;
      width: 320px;
      height: 240px;
      opacity: 0.001;
      pointer-events: none;
    }

    .badgeware-simulator canvas {
      width: 320px;
      height: 240px;
      display: block;
    }

    /* ── Output ──────────────────────────────────────────────────── */
    #stdout-wrap {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #stdout-header {
      padding: 5px 12px;
      font-size: 10px;
      font-weight: 400;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    #clear-btn {
      background: none;
      border: none;
      color: var(--dim);
      cursor: pointer;
      font-size: 10px;
      font-family: inherit;
      padding: 0 2px;
      line-height: 1;
      transition: color 0.15s;
    }
    #clear-btn:hover { color: var(--white); }

    #stdout {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px;
      font-family: Consolas, "Cascadia Code", "JetBrains Mono", "Courier New", monospace;
      font-size: 11px;
      line-height: 1.6;
      color: var(--green);
      white-space: pre-wrap;
      word-break: break-all;
      background: transparent;
    }

    #stdout::-webkit-scrollbar       { width: 6px; }
    #stdout::-webkit-scrollbar-track { background: transparent; }
    #stdout::-webkit-scrollbar-thumb { background: rgba(180,190,200,0.15); border-radius: 3px; }

    .out-dim   { color: var(--dim); }
    .out-error { color: rgba(240, 141, 73, 1); }

    /* ── File panel ──────────────────────────────────────────────── */
    #file-panel {
      width: 200px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      background: rgba(10, 20, 30, 0.5);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .fp-section-head {
      padding: 5px 8px 4px;
      font-size: 10px;
      font-weight: 400;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 2px;
      flex-shrink: 0;
    }

    .fp-section-title { flex: 1; }

    .fp-icon-btn {
      background: none;
      border: none;
      color: var(--dim);
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      padding: 1px 3px;
      border-radius: 3px;
      font-family: inherit;
    }
    .fp-icon-btn:hover { color: var(--white); background: rgba(235,245,255,0.06); }

    /* ── User section (resizable) ────────────────────────────────── */
    #fp-user-wrap {
      flex-shrink: 0;
      height: 220px;        /* default; drag handle overrides via inline style */
      min-height: 40px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #fp-user-list {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
    }

    .fp-empty {
      padding: 8px 10px;
      font-size: 11px;
      color: var(--dim);
      font-style: italic;
    }

    /* ── Vertical resize handle ──────────────────────────────────── */
    #fp-v-resize {
      height: 4px;
      flex-shrink: 0;
      background: var(--border);
      cursor: row-resize;
      transition: background 0.15s;
      position: relative;
    }
    #fp-v-resize::after { content: ''; position: absolute; inset: -4px 0; }
    #fp-v-resize:hover,
    #fp-v-resize.dragging { background: rgba(224, 137, 32, 0.5); }

    /* ── System section (fills remaining space) ──────────────────── */
    #fp-sys-wrap {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 60px;
    }

    #fp-sys-tree {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
    }

    #fp-user-list::-webkit-scrollbar,
    #fp-sys-tree::-webkit-scrollbar { width: 4px; }
    #fp-user-list::-webkit-scrollbar-track,
    #fp-sys-tree::-webkit-scrollbar-track { background: transparent; }
    #fp-user-list::-webkit-scrollbar-thumb,
    #fp-sys-tree::-webkit-scrollbar-thumb { background: rgba(180,190,200,0.12); border-radius: 2px; }

    /* ── Context menu ────────────────────────────────────────────── */
    #file-ctx-menu {
      display: none;
      position: fixed;
      z-index: 10000;
      background: rgb(15, 25, 35);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 3px 0;
      min-width: 145px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.55);
    }

    .ctx-item {
      padding: 5px 14px;
      font-size: 12px;
      color: var(--faint);
      cursor: pointer;
      user-select: none;
    }
    .ctx-item:hover { background: rgba(235,245,255,0.06); color: var(--white); }
    .ctx-item.ctx-danger { color: rgba(240,141,73,0.8); }
    .ctx-item.ctx-danger:hover { color: rgba(240,141,73,1); background: rgba(240,141,73,0.07); }
    .ctx-sep { height: 1px; background: var(--border); padding: 0; margin: 3px 0; cursor: default; }
    .ctx-sep:hover { background: var(--border); }

    /* ── Tree rows ───────────────────────────────────────────────── */
    .tree-row {
      display: flex;
      align-items: center;
      padding: 2px 8px;
      font-size: 12px;
      color: var(--faint);
      cursor: pointer;
      gap: 4px;
      white-space: nowrap;
      overflow: hidden;
      user-select: none;
    }
    .tree-row:hover { background: rgba(235,245,255,0.05); color: var(--white); }
    .tree-row.active { background: var(--faint-orange); color: var(--orange); }

    .tree-row .row-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tree-row .row-badge {
      font-size: 9px;
      color: var(--dim);
      flex-shrink: 0;
    }

    .row-actions { display: none; gap: 1px; flex-shrink: 0; }
    .tree-row:hover .row-actions { display: flex; }

    .row-action {
      background: none;
      border: none;
      color: inherit;
      opacity: 0.6;
      cursor: pointer;
      font-size: 11px;
      padding: 0 2px;
      line-height: 1;
    }
    .row-action:hover { opacity: 1; }

    /* ── Collapsible system directories ─────────────────────────── */
    details.tree-dir { }

    details.tree-dir > summary {
      list-style: none;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      font-size: 12px;
      color: var(--faint);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    details.tree-dir > summary::-webkit-details-marker { display: none; }
    details.tree-dir > summary:hover { background: rgba(235,245,255,0.05); color: var(--white); }

    .dir-arrow {
      font-size: 8px;
      flex-shrink: 0;
      transition: transform 0.12s;
      display: inline-block;
    }
    details.tree-dir[open] > summary .dir-arrow { transform: rotate(90deg); }

    .dir-children { padding-left: 10px; }

    /* ── Left resize handle ──────────────────────────────────────── */
    #left-resize-handle {
      width: 4px;
      flex-shrink: 0;
      background: var(--border);
      cursor: col-resize;
      transition: background 0.15s;
      position: relative;
    }
    #left-resize-handle::after { content: ''; position: absolute; inset: 0 -4px; }
    #left-resize-handle:hover,
    #left-resize-handle.dragging { background: rgba(224, 137, 32, 0.5); }
  </style>
</head>

<script>
/* ── Base64 helpers ──────────────────────────────────────────────────────── */
function b64ToBytes(b64) {
  const s = atob(b64);
  const b = new Uint8Array(s.length);
  for (let i = 0; i < s.length; i++) b[i] = s.charCodeAt(i);
  return b;
}
function bytesToB64(bytes) {
  let s = '';
  for (const b of bytes) s += String.fromCharCode(b);
  return btoa(s);
}

/* ── User filesystem (localStorage) ─────────────────────────────────────── */
const USER_FS_KEY = 'badgeware.userfs.v1';

const userFS = (() => {
  let data = {};
  try { data = JSON.parse(localStorage.getItem(USER_FS_KEY) || '{}'); } catch {}
  const persist = () => localStorage.setItem(USER_FS_KEY, JSON.stringify(data));
  return {
    get:   (p)    => data[p] ?? null,
    set:   (p, v) => { data[p] = v; persist(); },
    del:   (p)    => { delete data[p]; persist(); },
    paths: ()     => Object.keys(data).sort(),
    /* Entries suitable for postMessage to the worker */
    workerFiles: () => Object.entries(data).map(([name, f]) => ({
      name,
      content: f.binary ? b64ToBytes(f.data) : f.text,
    })),
  };
})();

/* ── System file list — populated after fetch('/simulator/filesystem.json') */
let systemPaths = [];
</script>

<!-- Monaco Editor (AMD loader) — requires CORS-eligible CDN responses.
     If the server is started with --cross (COEP require-corp) ensure your
     network can reach cdn.jsdelivr.net and that it returns CORS headers. -->

<script>
require.config({
  paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' },
});

require(['vs/editor/editor.main'], async function () {

  /* ── Type inference: scan document for ident = TypeName(...) patterns ──
     Returns the MEMBERS array for the inferred type, or null.             */
  function inferMembersFromDoc(ident, docText) {
    // Match:  ident = TypeName(        → direct constructor
    //         ident = module.method(   → factory method on a known module
    const re = new RegExp(`\\b${ident}\\s*=\\s*(\\w+)(?:\\.(\\w+))?\\s*\\(`, 'g');
    let last = null, m;
    while ((m = re.exec(docText)) !== null) last = m;
    if (!last) return null;

    const [, typeName, method] = last;

    // Direct constructor: pos = vec2(...), bounds = rect(...), etc.
    if (!method) return MEMBERS[typeName] ?? null;

    // Factory call on a known module/type
    switch (typeName) {
      case 'shape':      return MEMBERS.shape;               // any shape.* → shape instance
      case 'image':      return (method === 'load' || method === 'window') ? MEMBERS.image : null;
      case 'screen':     return method === 'window' ? MEMBERS.image : null;
      case 'SpriteSheet': {
        if (method === 'animation') return MEMBERS.AnimatedSprite;
        if (method === 'sprite')    return MEMBERS.image;
        return null;
      }
      default:           return null;
    }
  }

  /* ── Completion provider ───────────────────────────────────────── */
  monaco.languages.registerCompletionItemProvider('python', {
    triggerCharacters: ['.'],

    provideCompletionItems(model, position) {
      const linePrefix = model.getValueInRange({
        startLineNumber: position.lineNumber,
        startColumn: 1,
        endLineNumber: position.lineNumber,
        endColumn: position.column,
      });

      // ── File-path completion inside string literals ─────────────
      // Matches the partial path after an opening quote, e.g. open("/rom/fon
      const strMatch = linePrefix.match(/["']((?:\/|\.\/)[^"']*)$/);
      if (strMatch) {
        const partial   = strMatch[1];
        const lastSlash = partial.lastIndexOf('/');
        const dir       = partial.slice(0, lastSlash + 1);   // "/rom/"
        const prefix    = partial.slice(lastSlash + 1);       // "fon"

        const allPaths = [...systemPaths, ...userFS.paths()];
        const seen = new Set();
        const suggestions = [];

        for (const p of allPaths) {
          if (!p.startsWith(dir)) continue;
          const rest  = p.slice(dir.length);
          const slash = rest.indexOf('/');
          const seg   = slash === -1 ? rest : rest.slice(0, slash + 1);
          if (!seg.startsWith(prefix) || seen.has(seg)) continue;
          seen.add(seg);
          const isDir = seg.endsWith('/');
          suggestions.push({
            label:    seg,
            kind:     isDir
              ? monaco.languages.CompletionItemKind.Folder
              : monaco.languages.CompletionItemKind.File,
            detail:   isDir ? 'directory' : p,
            insertText: seg,
            sortText: (isDir ? '0' : '1') + seg,
            range: {
              startLineNumber: position.lineNumber,
              startColumn:     position.column - prefix.length,
              endLineNumber:   position.lineNumber,
              endColumn:       position.column,
            },
          });
        }
        return { suggestions };
      }

      // Detect "identifier." at end of typed text
      const dotMatch = linePrefix.match(/(\w+)\.\s*$/);

      if (dotMatch) {
        const ident   = dotMatch[1];
        const members = MEMBERS[ident] ?? inferMembersFromDoc(ident, model.getValue());
        if (members) {
          const word  = model.getWordUntilPosition(position);
          const range = {
            startLineNumber: position.lineNumber,
            startColumn:     word.startColumn,
            endLineNumber:   position.lineNumber,
            endColumn:       word.endColumn,
          };
          return { suggestions: members.map(m => toCompletionItem(m, range, monaco)) };
        }
        // Unknown object after a dot — let Monaco handle it
        return { suggestions: [] };
      }

      // Global completions
      const word  = model.getWordUntilPosition(position);
      const range = {
        startLineNumber: position.lineNumber,
        startColumn:     word.startColumn,
        endLineNumber:   position.lineNumber,
        endColumn:       word.endColumn,
      };
      return { suggestions: BADGEWARE_GLOBALS.map(m => toCompletionItem(m, range, monaco)) };
    },
  });

  /* ── Editor ────────────────────────────────────────────────────── */
  const editor = monaco.editor.create(document.getElementById('editor'), {

  // Load default example into the editor
  const defaultCode = await fetch('/simulator/examples/default_code.py')
    .then(r => r.ok ? r.text() : null)
    .catch(() => null)
    ?? 'badge.mode(HIRES)\n\ndef update():\n    screen.text("Hello!", 10, 10)\n';

  /* ── File / model state (needed early so model functions can reference them) */
  let currentFilePath = null;   // FS path when a user file is active, otherwise null
  let currentReadOnly = false;
  let currentTabKey   = null;   // key into openModels for the active tab
  let transientTabKey = null;   // key of the one transient (preview) tab, if any
  const openModels    = new Map();  // tabKey → { model, dirty, readOnly, transient, label? }
  const openOrder     = [];         // ordered list of open tabKeys

  // Bootstrap the default scratch tab (openScratchTab is hoisted as a function decl)
  openScratchTab('default_code.py', defaultCode);

  /* ── Simulator ─────────────────────────────────────────────────── */
  /* Three.js badge refs — set by async setup below */
  let _three = null, _glbScreenMesh = null, _glbScreenTex = null;

  function applyCanvasToScreen() {
    if (!_three || !_glbScreenMesh || !simulator.canvas) return;
    if (_glbScreenTex) _glbScreenTex.dispose();
    _glbScreenTex = new _three.CanvasTexture(simulator.canvas);
    _glbScreenTex.magFilter  = _three.NearestFilter;
    _glbScreenTex.minFilter  = _three.NearestFilter;
    _glbScreenTex.flipY      = false;
    _glbScreenTex.colorSpace = _three.SRGBColorSpace;
    // MeshBasicMaterial is unlit — scene lights can't lift the blacks.
    if (!(_glbScreenMesh.material instanceof _three.MeshBasicMaterial)) {
      _glbScreenMesh.material = new _three.MeshBasicMaterial();
    }
    _glbScreenMesh.material.map         = _glbScreenTex;
    _glbScreenMesh.material.needsUpdate = true;
  }

  const simHost   = document.getElementById('sim-host');
  const stdoutEl  = document.getElementById('stdout');
  const statusEl  = document.getElementById('status');

  const simulator = await BadgewareSimulator(simHost);

  /* ── 3D badge display (non-blocking) ──────────────────────────── */
  ;(async () => {
    try {
      const THREE              = await import('three');
      const { GLTFLoader }     = await import('three/addons/loaders/GLTFLoader.js');
      const { OrbitControls }  = await import('three/addons/controls/OrbitControls.js');
      _three = THREE;

      const wrap = document.getElementById('badge-3d-wrap');
      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(wrap.clientWidth, wrap.clientHeight);
      renderer.setClearColor(0x000000, 0);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      wrap.appendChild(renderer.domElement);

      const scene  = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(22, wrap.clientWidth / wrap.clientHeight, 0.001, 10);

      /* OrbitControls — drag to rotate, no pan/zoom extremes */
      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping  = true;
      controls.dampingFactor  = 0.06;
      controls.enablePan      = false;
      controls.minDistance    = 0.05;
      controls.maxDistance    = 0.8;
      controls.rotateSpeed    = 0.6;

      /* Forward badge key events from the 3D canvas */
      const keyMap = { 38: 2, 40: 1, 37: 16, 39: 4, 32: 8, 27: 32 };
      renderer.domElement.tabIndex = 0;
      renderer.domElement.addEventListener('keydown', ev => {
        const btn = keyMap[ev.keyCode] ?? 0;
        if (!btn || !simulator.micropython) return;
        simulator.buttons |= btn;
        simulator.micropython.postMessage({ buttons: simulator.buttons });
        ev.preventDefault();
      });
      renderer.domElement.addEventListener('keyup', ev => {
        const btn = keyMap[ev.keyCode] ?? 0;
        if (!btn || !simulator.micropython) return;
        simulator.buttons &= ~btn;
        simulator.micropython.postMessage({ buttons: simulator.buttons });
        ev.preventDefault();
      });

      /* Lighting */
      scene.add(new THREE.AmbientLight(0xffffff, 0.7));
      const keyLight = new THREE.DirectionalLight(0xffffff, 2.5);
      keyLight.position.set(0.4, 0.8, 1);
      scene.add(keyLight);
      const fillLight = new THREE.DirectionalLight(0x8090d0, 0.6);
      fillLight.position.set(-0.6, 0.2, 0.3);
      scene.add(fillLight);

      /* Button raycasting */
      const allHitMeshes = [];
      const raycaster    = new THREE.Raycaster();
      let   heldMask     = 0;
      let   buttonAnimator  = null;
      let   ledState        = null;   // { lights: PointLight[4], coverMesh }
      let   _ledSimActive   = false;  // true once MicroPython has sent caselights data

      // Drive the 3D case LEDs when badge.caselights() is called from MicroPython
      simulator.caselights = (values) => {
        _ledSimActive = true;
        if (!ledState) return;
        const { lights, coverMesh } = ledState;
        lights.forEach((l, i) => { l.intensity = (values[i] || 0) * 2; });
        if (coverMesh) coverMesh.material.emissiveIntensity = Math.max(...values);
      };

      function buttonMaskAt(ev) {
        if (!_glbScreenMesh) return { mask: 0, worldPt: null };
        const rect  = renderer.domElement.getBoundingClientRect();
        const mouse = new THREE.Vector2(
          ((ev.clientX - rect.left) / rect.width)  *  2 - 1,
          ((ev.clientY - rect.top)  / rect.height) * -2 + 1,
        );
        raycaster.setFromCamera(mouse, camera);
        const hits = raycaster.intersectObjects(allHitMeshes, true);
        if (!hits.length) return { mask: 0, worldPt: null };
        const worldPt = hits[0].point.clone();
        const lp = _glbScreenMesh.worldToLocal(hits[0].point.clone());
        // lp.x = left(-)/right(+), lp.z = up(-)/down(+) in screen-local space
        // Screen area x∈[-0.029,+0.029], z∈[-0.022,+0.022]
        // Ignore screen area
        if (Math.abs(lp.x) < 0.029 && lp.z < 0.022 && lp.z > -0.022) return { mask: 0, worldPt: null };
        // Right-edge panel only — constrain Z so far corners don't fire
        if (lp.x > 0.028 && lp.x < 0.045 && lp.z > -0.016 && lp.z < 0.020) {
          return { mask: lp.z < 0.005 ? 2 : 1, worldPt };                     // UP / DOWN
        }
        // Bottom button strip — constrain to centred region just below screen
        if (lp.z > 0.018 && lp.z < 0.035 && Math.abs(lp.x) < 0.028) {
          const mask = lp.x < -0.008 ? 16 : lp.x < +0.008 ? 8 : 4;
          return { mask, worldPt };                                             // A / B / C
        }
        return { mask: 0, worldPt: null };
      }

      // Capture-phase pointerdown so button hits block OrbitControls entirely
      renderer.domElement.addEventListener('pointerdown', ev => {
        const { mask, worldPt } = buttonMaskAt(ev);
        if (!mask) return;
        heldMask = mask;
        simulator.buttons |= mask;
        if (simulator.micropython) simulator.micropython.postMessage({ buttons: simulator.buttons });
        if (buttonAnimator) buttonAnimator.press(mask, worldPt);
        controls.enabled = false;
        ev.stopPropagation();
      }, true);

      renderer.domElement.addEventListener('pointerup', ev => {
        if (!heldMask) return;
        simulator.buttons &= ~heldMask;
        if (buttonAnimator) buttonAnimator.release(heldMask);
        heldMask = 0;
        if (simulator.micropython) simulator.micropython.postMessage({ buttons: simulator.buttons });
        controls.enabled = true;
        ev.stopPropagation();
      }, true);

      renderer.domElement.addEventListener('pointercancel', () => {
        if (!heldMask) return;
        simulator.buttons &= ~heldMask;
        if (buttonAnimator) buttonAnimator.release(heldMask);
        heldMask = 0;
        if (simulator.micropython) simulator.micropython.postMessage({ buttons: simulator.buttons });
        controls.enabled = true;
      });

      /* ── Button press animation (siloed — swap out when geometry improves) ──
         Approach: onBeforeCompile vertex displacement on the cap mesh(es)
         found by raycasting at each button zone, plus a screen-space ripple. */
      function initButtonAnimator(root, tuftyNode) {
        root.updateWorldMatrix(true, true);

        // Badge face outward normal in world space (= screen local +Y → world)
        const faceOut = new THREE.Vector3(0, 1, 0)
          .transformDirection(_glbScreenMesh.matrixWorld).normalize();
        const faceIn  = faceOut.clone().negate();

        // Button zone centres in screen-local space (Y=0 = on screen plane)
        const BTN_DEFS = [
          { mask: 16, slc: new THREE.Vector3(-0.018,  0,  0.023) }, // A
          { mask:  8, slc: new THREE.Vector3(  0.00,  0,  0.023) }, // B
          { mask:  4, slc: new THREE.Vector3(+0.018,  0,  0.023) }, // C
          { mask:  2, slc: new THREE.Vector3(+0.035,  0, -0.002) }, // UP
          { mask:  1, slc: new THREE.Vector3(+0.035,  0, +0.010) }, // DOWN
        ];

        // Raycast from in front of each zone inward to find actual hit mesh + world point
        const btnRay = new THREE.Raycaster();
        const hitData = BTN_DEFS.map((b, idx) => {
          const worldPt = _glbScreenMesh.localToWorld(b.slc.clone());
          const origin  = worldPt.clone().addScaledVector(faceOut, 0.04);
          btnRay.set(origin, faceIn);
          const hits = btnRay.intersectObjects(allHitMeshes, false)
                             .filter(h => h.object !== _glbScreenMesh);
          return {
            mask:    b.mask,
            idx,
            worldPt: hits.length ? hits[0].point.clone() : worldPt.clone(),
            mesh:    hits.length ? hits[0].object : null,
          };
        });

        // Shared animation state — one slot per BTN_DEFS entry
        const pressVals = [0, 0, 0, 0, 0];
        const targets   = [0, 0, 0, 0, 0];

        // ── Ripple pool (visual "dash of 3") ─────────────────────────────
        const RIPPLE_DUR  = 0.42;
        const ripplePool  = Array.from({ length: 4 }, () => {
          const mat  = new THREE.MeshBasicMaterial({
            color: 0xffffff, transparent: true, opacity: 0,
            side: THREE.DoubleSide, depthWrite: false,
          });
          const mesh = new THREE.Mesh(new THREE.RingGeometry(0.003, 0.007, 32), mat);
          mesh.visible = false;
          scene.add(mesh);
          return { mesh, t: -1 };
        });

        const _ringNormal = new THREE.Vector3(0, 0, 1);
        function spawnRipple(worldPt) {
          const r = ripplePool.find(r => r.t < 0)
                 || ripplePool.reduce((a, b) => a.t > b.t ? a : b);
          r.mesh.position.copy(worldPt).addScaledVector(faceOut, 0.0003);
          r.mesh.quaternion.setFromUnitVectors(_ringNormal, faceOut);
          r.mesh.scale.setScalar(0.15);
          r.mesh.material.opacity = 0.55;
          r.mesh.visible = true;
          r.t = 0;
        }

        // ── Public API ────────────────────────────────────────────────────
        const PRESS_SPD   = 22;
        const RELEASE_SPD = 9;

        return {
          press(mask, worldHitPt) {
            hitData.forEach(h => { if (mask & h.mask) targets[h.idx] = 1; });
            if (worldHitPt) spawnRipple(worldHitPt);
          },
          release(mask) {
            hitData.forEach(h => { if (mask & h.mask) targets[h.idx] = 0; });
          },
          update(dt) {
            for (let i = 0; i < 5; i++) {
              const spd = targets[i] > pressVals[i] ? PRESS_SPD : RELEASE_SPD;
              pressVals[i] += (targets[i] - pressVals[i]) * Math.min(1, spd * dt);
            }

            ripplePool.forEach(r => {
              if (r.t < 0) return;
              r.t += dt / RIPPLE_DUR;
              if (r.t >= 1) { r.t = -1; r.mesh.visible = false; return; }
              const ease = 1 - Math.pow(1 - r.t, 2);
              r.mesh.scale.setScalar(0.15 + ease * 1.85);
              r.mesh.material.opacity = 0.55 * (1 - r.t);
            });
          },
        };
      }

      /* ── Case LEDs (4× PointLights behind badge + emissive cover) ── */
      function createLedLights(root) {
        root.updateWorldMatrix(true, true);
        const faceOut = new THREE.Vector3(0, 1, 0)
          .transformDirection(_glbScreenMesh.matrixWorld).normalize();

        const rm4 = root.getObjectByName('RM051_4');
        if (!rm4 || !rm4.isMesh) return { lights: [], coverMesh: null };

        rm4.material = rm4.material.clone();
        rm4.material.emissive.set(1, 0.94, 0.88);
        rm4.material.emissiveIntensity = 0;

        // Centroids of the 4 LED clusters in RM051_4's own mesh space
        // (RM051 and tufty_packages both carry non-trivial matrices, so we
        //  must use rm4.localToWorld() rather than tuftyNode.localToWorld())
        const LED_MESH_LOCAL = [
          new THREE.Vector3(-0.02700, 0, -0.04855), // CL0: left-top
          new THREE.Vector3(-0.02700, 0, -0.00855), // CL1: left-bottom
          new THREE.Vector3(+0.02700, 0, -0.04855), // CL2: right-top
          new THREE.Vector3(+0.02683, 0, -0.00855), // CL3: right-bottom
        ];
        const lights = LED_MESH_LOCAL.map(lp => {
          const wp = rm4.localToWorld(lp.clone());
          wp.addScaledVector(faceOut, -0.002); // 2mm inside back face
          const light = new THREE.PointLight(0xfff0e0, 0, 0.04, 2);
          light.position.copy(wp);
          scene.add(light);
          return light;
        });

        return { lights, coverMesh: rm4 };
      }

      /* Load the Tufty badge model */
      new GLTFLoader().load('/static/models/badgeware.glb', (gltf) => {
        const root      = gltf.scene;
        const tuftyNode = root.getObjectByName('tufty');
        const caseBack  = root.getObjectByName('badger_case_back');
        const caseFront = root.getObjectByName('badger_case_front');

        /* Clone orange case for Tufty before hiding Badger */
        if (caseBack && tuftyNode) {
          const cb = caseBack.clone(true);
          cb.traverse(child => {
            if (child.isMesh) {
              child.material = child.material.clone();
              child.material.color.setRGB(1, 0.42, 0);
            }
          });
          tuftyNode.add(cb);
        }
        if (caseFront && tuftyNode) {
          tuftyNode.add(caseFront.clone(true));
        }

        /* Hide the other two badges */
        ['badger', 'blinky'].forEach(name => {
          const n = root.getObjectByName(name);
          if (n) n.visible = false;
        });

        scene.add(root);
        root.updateWorldMatrix(true, true);

        /* Grab the active screen mesh and clone its material */
        _glbScreenMesh = root.getObjectByName('tufty_screen_active');
        if (_glbScreenMesh) {
          _glbScreenMesh.material = _glbScreenMesh.material.clone();
          if (simulator.canvas) applyCanvasToScreen();
        }

        /* Slight default Y tilt for visual style */
        if (tuftyNode) tuftyNode.rotation.y = -0.2;

        /* Position camera along screen's outward normal for a face-on view.
           The screen mesh lies in the local XZ plane, so local +Y is the face normal. */
        if (_glbScreenMesh && tuftyNode) {
          const screenNormal = new THREE.Vector3(0, 1, 0)
            .transformDirection(_glbScreenMesh.matrixWorld);

          const tuftyBox = new THREE.Box3().setFromObject(tuftyNode);
          const center   = tuftyBox.getCenter(new THREE.Vector3());
          const size     = tuftyBox.getSize(new THREE.Vector3());
          const maxDim   = Math.max(size.x, size.y, size.z);
          const fovRad   = camera.fov * (Math.PI / 180);
          const dist     = (maxDim / 2) / Math.tan(fovRad / 2) * 1.0;

          /* Place camera along screen normal, slight X offset for 3/4 angle */
          camera.position.copy(center)
            .addScaledVector(screenNormal, dist)
            .addScaledVector(new THREE.Vector3(1, 0, 0), maxDim * 0.12);
          camera.lookAt(center);
          controls.target.copy(center);
          controls.update();
        }

        /* Collect all tufty meshes for raycasting — button detection uses hit position */
        if (tuftyNode) {
          tuftyNode.traverse(child => {
            if (child.isMesh) allHitMeshes.push(child);
          });
        }

        /* Init button animator after meshes are collected and matrices settled */
        if (_glbScreenMesh && tuftyNode) {
          buttonAnimator = initButtonAnimator(root, tuftyNode);
          ledState = createLedLights(root);
        }
      });

      /* Keep renderer sized to container */
      new ResizeObserver(() => {
        const w = wrap.clientWidth, h = wrap.clientHeight;
        if (!w || !h) return;
        renderer.setSize(w, h);
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.render(scene, camera);
      }).observe(wrap);

      /* Render loop */
      let _loopLastT = 0;
      ;(function loop(t = 0) {
        requestAnimationFrame(loop);
        const dt = Math.min((t - _loopLastT) / 1000, 0.1);
        _loopLastT = t;
        controls.update();
        if (_glbScreenTex) _glbScreenTex.needsUpdate = true;
        if (buttonAnimator) buttonAnimator.update(dt);
        if (ledState && !_ledSimActive) {
          const { lights, coverMesh } = ledState;
          lights.forEach((l, i) => {
            l.intensity = Math.max(0, Math.cos(t * 0.0025 + i * Math.PI * 0.5)) ** 2 * 2;
          });
          if (coverMesh) coverMesh.material.emissiveIntensity = Math.max(...lights.map(l => l.intensity)) / 2;
        }
        renderer.render(scene, camera);
      })();

    } catch (e) {
      console.warn('3D badge setup failed:', e);
    }
  })();

  const appendOut = (text, cls) => {
    const span = document.createElement('span');
    span.textContent = text + '\n';
    if (cls) span.className = cls;
    stdoutEl.appendChild(span);
    stdoutEl.scrollTop = stdoutEl.scrollHeight;
  };

  /* ── Runtime error → Monaco marker wiring ─────────────────────── */
  let lastRunKey   = null;   // tab key active when Run was pressed
  let traceFrames  = [];     // [{file, line}] accumulated during current traceback

  function clearRuntimeMarkers() {
    for (const info of openModels.values()) {
      if (info.model) monaco.editor.setModelMarkers(info.model, 'micropython', []);
    }
  }

  function applyTracebackMarkers(errorMsg) {
    // Group frames by model (multiple frames can hit the same file)
    const markersByModel = new Map();
    for (const frame of traceFrames) {
      // <stdin> is the code passed directly to runPython — the active tab at run time
      const key  = frame.file === '<stdin>' ? lastRunKey : frame.file;
      if (!key) continue;
      const info = openModels.get(key);
      if (!info?.model) continue;
      const model  = info.model;
      const lineNo = Math.min(Math.max(frame.line, 1), model.getLineCount());
      const list   = markersByModel.get(model) ?? [];
      list.push({
        startLineNumber: lineNo,
        startColumn:     1,
        endLineNumber:   lineNo,
        endColumn:       model.getLineLength(lineNo) + 1,
        message:         errorMsg,
        severity:        monaco.MarkerSeverity.Error,
      });
      markersByModel.set(model, list);
    }
    for (const [model, markers] of markersByModel) {
      monaco.editor.setModelMarkers(model, 'micropython', markers);
    }
  }

  // Called for every stdout line — parse MicroPython traceback incrementally
  function parseTracebackLine(text) {
    // "  File "path", line N[, in func]"
    const fileMatch = text.match(/^\s+File "([^"]+)", line (\d+)/);
    if (fileMatch) {
      traceFrames.push({ file: fileMatch[1], line: parseInt(fileMatch[2], 10) });
      return;
    }
    // Start of a new exception block — reset so previous partial traces don't leak
    if (text.startsWith('Traceback (most recent call last):')) {
      traceFrames = [];
      return;
    }
    // Terminal error line: non-whitespace start, frames already accumulated
    // e.g. "TypeError: ...", "SyntaxError: ...", "OSError: ..."
    if (traceFrames.length > 0 && /^\w/.test(text)) {
      applyTracebackMarkers(text);
      traceFrames = [];
    }
  }

  // Override the simulator's stdout handler
  simulator.stdout = async (text) => {
    parseTracebackLine(text);
    appendOut(text);
  };

  /* ── Run action ────────────────────────────────────────────────── */
  const runCode = async () => {
    const code = editor.getValue();
    // Auto-save to user FS if a named file is open
    if (currentFilePath && !currentReadOnly) {
      userFS.set(currentFilePath, { text: code, binary: false });
    }
    clearRuntimeMarkers();
    traceFrames = [];
    lastRunKey  = currentTabKey;
    stdoutEl.innerHTML = '';
    appendOut('▶ Running…', 'out-dim');
    statusEl.textContent = 'Running…';
    try {
      await simulator.run(code, userFS.workerFiles());
      applyCanvasToScreen();
      statusEl.textContent = currentFilePath && !currentReadOnly ? currentFilePath : '';
    } catch (err) {
      appendOut('✕ ' + err, 'out-error');
      statusEl.textContent = 'Error';
    }
  };

  // F5 keybinding inside the editor
  editor.addAction({
    id:                   'badgeware.run',
    label:                'Run in Simulator',
    keybindings:          [monaco.KeyCode.F5],
    contextMenuGroupId:   'navigation',
    contextMenuOrder:     1,
    run:                  runCode,
  });

  // Ctrl/Cmd+S — explicit save
  editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS, saveCurrentFile);

  /* ── Toolbar wiring ────────────────────────────────────────────── */
  document.getElementById('run-btn').addEventListener('click', runCode);

  document.getElementById('example-select').addEventListener('change', async (e) => {
    if (!e.target.value) return;
    const name = e.target.value.split('/').pop();
    const code = await fetch(e.target.value).then(r => r.ok ? r.text() : null).catch(() => null);
    if (code != null) openScratchTab(name, code);
    e.target.value = '';
  });

  document.getElementById('clear-btn').addEventListener('click', () => {
    stdoutEl.innerHTML = '';
  });

  /* ── Load system file list ─────────────────────────────────────── */
  try {
    const fsData = await fetch('/simulator/filesystem.json').then(r => r.json());
    systemPaths = (fsData.files || []);
    // Reset the built flag so refreshFileTree rebuilds the sys tree with real paths
    const sysTreeEl = document.getElementById('fp-sys-tree');
    if (sysTreeEl) { sysTreeEl._built = false; sysTreeEl.innerHTML = ''; }
  } catch (_) {}

  /* ── File browser state ────────────────────────────────────────── */
  function setCurrentFile(tabKey, readOnly = false) {
    currentTabKey   = tabKey;
    // User-file keys are bare FS paths starting with '/'; others have a scheme prefix
    currentFilePath = (tabKey && !tabKey.includes(':')) ? tabKey : null;
    currentReadOnly = readOnly;
    editor.updateOptions({ readOnly });
    renderTabs();
    refreshFileTree();
  }

  /* ── Tab / model management ────────────────────────────────────── */
  function langForPath(p) {
    return p.endsWith('.py') ? 'python' : p.endsWith('.json') ? 'json' : 'plaintext';
  }

  function tabLabel(key) {
    const info = openModels.get(key);
    if (info?.label) return info.label;
    return key.includes(':') ? key.split(':').pop().split('/').pop() : key.split('/').pop();
  }

  function renderTabs() {
    const bar = document.getElementById('tab-bar');
    if (!bar) return;
    bar.innerHTML = '';
    for (const key of openOrder) {
      const info = openModels.get(key);
      if (!info) continue;
      const isActive = key === currentTabKey;
      const tab = document.createElement('div');
      tab.className = 'tab' + (isActive ? ' active' : '') + (info.dirty ? ' dirty' : '') + (info.transient ? ' transient' : '');
      tab.title = key;

      const name = document.createElement('span');
      name.className = 'tab-name';
      name.textContent = tabLabel(key);

      if (info.readOnly) {
        const ro = document.createElement('span');
        ro.className = 'tab-readonly';
        ro.textContent = '🔒';
        tab.appendChild(name);
        tab.appendChild(ro);
      } else {
        tab.appendChild(name);
      }

      const x = document.createElement('button');
      x.className = 'tab-close';
      x.textContent = '✕';
      x.title = 'Close';
      x.addEventListener('click', ev => { ev.stopPropagation(); closeTab(key); });
      tab.appendChild(x);
      tab.addEventListener('click',    () => focusTab(key));
      tab.addEventListener('dblclick', () => promoteTab(key));
      bar.appendChild(tab);
    }
  }

  function focusTab(key) {
    const info = openModels.get(key);
    if (!info) return;
    currentTabKey   = key;
    currentFilePath = key.includes(':') ? null : key;
    currentReadOnly = info.readOnly;

    const editorEl  = document.getElementById('editor');
    const imgEl     = document.getElementById('img-preview');

    if (info.imgUrl) {
      editorEl.style.display  = 'none';
      imgEl.style.display     = 'flex';
      const imgTag = document.getElementById('img-preview-img');
      imgTag.src = info.imgUrl;
      document.getElementById('img-preview-name').textContent = tabLabel(key);
      if (info.dimText) {
        document.getElementById('img-preview-dim').textContent = info.dimText;
      } else {
        document.getElementById('img-preview-dim').textContent = '';
        imgTag.onload = () => {
          document.getElementById('img-preview-dim').textContent = imgTag.naturalWidth + ' × ' + imgTag.naturalHeight + ' px';
        };
      }
    } else {
      editorEl.style.display  = '';
      imgEl.style.display     = 'none';
      editor.setModel(info.model);
      editor.updateOptions({ readOnly: info.readOnly });
    }

    refreshFileTree();
    renderTabs();
  }

  function closeTab(key) {
    const info = openModels.get(key);
    if (!info) return;
    if (info.dirty && !confirm('Close "' + tabLabel(key) + '" with unsaved changes?')) return;
    if (info.imgUrl) URL.revokeObjectURL(info.imgUrl);
    else if (info.model) info.model.dispose();
    openModels.delete(key);
    if (transientTabKey === key) transientTabKey = null;
    const idx = openOrder.indexOf(key);
    if (idx !== -1) openOrder.splice(idx, 1);
    if (currentTabKey === key) {
      if (openOrder.length > 0) {
        focusTab(openOrder[Math.max(0, idx - 1)]);
      } else {
        openScratchTab('untitled.py', '');
      }
    }
    renderTabs();
  }

  function evictTransient(incomingKey) {
    if (!transientTabKey || transientTabKey === incomingKey) return;
    const info = openModels.get(transientTabKey);
    if (!info) { transientTabKey = null; return; }
    if (info.imgUrl) URL.revokeObjectURL(info.imgUrl);
    else if (info.model) info.model.dispose();
    openOrder.splice(openOrder.indexOf(transientTabKey), 1);
    openModels.delete(transientTabKey);
    transientTabKey = null;
  }

  function promoteTab(key) {
    const info = openModels.get(key);
    if (!info || !info.transient) return;
    info.transient = false;
    if (transientTabKey === key) transientTabKey = null;
    renderTabs();
  }

  function openScratchTab(name, content) {
    const key = 'scratch:' + name;
    if (openModels.has(key)) { focusTab(key); return; }
    const uri   = monaco.Uri.parse('badgeware:///scratch/' + encodeURIComponent(name));
    const model = monaco.editor.createModel(content, langForPath(name), uri);
    openModels.set(key, { model, dirty: false, readOnly: false, label: name });
    openOrder.push(key);
    currentTabKey   = key;
    currentFilePath = null;
    currentReadOnly = false;
    editor.setModel(model);
    editor.updateOptions({ readOnly: false });
    renderTabs();
    refreshFileTree();
  }

  function saveCurrentFile() {
    if (!currentTabKey) return;
    if (currentReadOnly) return;

    if (!currentTabKey.includes(':')) {
      // User file — already auto-saved; just flash confirmation
      const prev = statusEl.textContent;
      statusEl.textContent = '✓ Saved ' + tabLabel(currentTabKey);
      setTimeout(() => { statusEl.textContent = prev; }, 1400);
      return;
    }

    // Scratch tab — prompt for name to save as user file
    const suggested = tabLabel(currentTabKey);
    const input = prompt('Save as:', suggested.endsWith('.py') ? suggested : suggested + '.py');
    if (!input) return;
    const path = normalisePath(input);
    const text = editor.getValue();
    userFS.set(path, { text, binary: false });

    // Re-key the existing model as a permanent user-file tab
    const prevKey = currentTabKey;
    const info    = openModels.get(prevKey);
    if (transientTabKey === prevKey) transientTabKey = null;
    openModels.delete(prevKey);
    const idx = openOrder.indexOf(prevKey);
    openOrder.splice(idx, 1, path);
    openModels.set(path, { ...info, dirty: false, readOnly: false, transient: false, label: null });
    currentTabKey   = path;
    currentFilePath = path;

    refreshFileTree();
    renderTabs();
    statusEl.textContent = '✓ Saved ' + path;
    setTimeout(() => { statusEl.textContent = path; }, 1500);
  }

  /* ── System file tree ───────────────────────────────────────────── */
  function buildDirTree(paths) {
    const root = {};
    for (const p of paths) {
      // Paths ending with / are explicit directory markers
      const isDir = p.endsWith('/');
      const parts = p.split('/').filter(Boolean);
      let node = root;
      const limit = isDir ? parts.length : parts.length - 1;
      for (let i = 0; i < limit; i++) {
        if (!node[parts[i]]) node[parts[i]] = { __dir: true };
        node = node[parts[i]];
      }
      if (!isDir) node[parts[parts.length - 1]] = null;
    }
    return root;
  }

  function renderDirNode(node, pathPrefix, depth) {
    const wrap = document.createElement('div');
    if (depth > 0) wrap.className = 'dir-children';

    const entries = Object.entries(node)
      .filter(([k]) => k !== '__dir')
      .sort(([a, av], [b, bv]) => {
        const ad = av && av.__dir, bd = bv && bv.__dir;
        return (ad === bd) ? a.localeCompare(b) : (ad ? -1 : 1);
      });

    for (const [name, child] of entries) {
      const fullPath = pathPrefix + '/' + name;
      if (child && child.__dir) {
        const details = document.createElement('details');
        details.className = 'tree-dir';
        const summary = document.createElement('summary');
        summary.innerHTML = `<span class="dir-arrow">&#9658;</span><span>${name}/</span>`;
        details.appendChild(summary);
        details.appendChild(renderDirNode(child, fullPath, depth + 1));
        wrap.appendChild(details);
      } else {
        const row = document.createElement('div');
        row.className = 'tree-row';
        row.dataset.path = fullPath;
        row.title = fullPath;
        row.innerHTML = `<span class="row-name">${name}</span><span class="row-badge" title="System file">&#128274;</span>`;
        row.addEventListener('click',    () => openSysFile(fullPath, true));
        row.addEventListener('dblclick', () => openSysFile(fullPath, false));
        wrap.appendChild(row);
      }
    }
    return wrap;
  }

  /* ── File helpers ──────────────────────────────────────────────── */
  const TEXT_EXTS  = new Set(['.py', '.json', '.txt', '.md', '.csv', '.toml', '.ini', '.mpy']);
  const IMAGE_EXTS = new Set(['.png', '.jpg', '.jpeg', '.svg', '.gif', '.bmp', '.webp']);

  function normalisePath(raw) {
    // Ensure the path starts with / and trim whitespace
    const p = raw.trim();
    return p.startsWith('/') ? p : '/' + p;
  }

  async function openSysFile(path, transient = false) {
    const ext = path.slice(path.lastIndexOf('.'));
    if (ext === '.ppf') { await openSysPpfFile(path, transient); return; }
    if (ext === '.af')  { await openSysAfFile(path, transient);  return; }
    if (!TEXT_EXTS.has(ext)) return;
    const key = 'sys:' + path;
    if (openModels.has(key)) {
      if (!transient && openModels.get(key).transient) promoteTab(key);
      focusTab(key);
      statusEl.textContent = path + ' — read-only';
      return;
    }
    if (transient) evictTransient(key);
    try {
      const text = await fetch('/simulator/filesystem' + path).then(r => {
        if (!r.ok) throw new Error();
        return r.text();
      });
      const uri   = monaco.Uri.parse('badgeware:///sys' + encodeURIComponent(path));
      const model = monaco.editor.createModel(text, langForPath(path), uri);
      openModels.set(key, { model, dirty: false, readOnly: true, transient });
      openOrder.push(key);
      if (transient) transientTabKey = key;
    } catch (_) { return; }
    focusTab(key);
    statusEl.textContent = path + ' — read-only';
  }

  function openUserFile(path, transient = false) {
    const entry = userFS.get(path);
    if (!entry || entry.isDir) return;
    const ext = path.slice(path.lastIndexOf('.')).toLowerCase();
    if (IMAGE_EXTS.has(ext)) { openUserImageFile(path, entry, transient); return; }
    if (ext === '.ppf') { openUserPpfFile(path, entry, transient); return; }
    if (ext === '.af')  { openUserAfFile(path, entry, transient);  return; }
    if (entry.binary) return;
    if (openModels.has(path)) {
      if (!transient && openModels.get(path).transient) promoteTab(path);
      focusTab(path);
      return;
    }
    if (transient) evictTransient(path);
    const uri   = monaco.Uri.parse('badgeware:///user' + encodeURIComponent(path));
    const model = monaco.editor.createModel(entry.text, langForPath(path), uri);
    openModels.set(path, { model, dirty: false, readOnly: false, transient });
    openOrder.push(path);
    if (transient) transientTabKey = path;
    focusTab(path);
  }

  function openUserImageFile(path, entry, transient = false) {
    const imgKey = 'img:' + path;
    if (openModels.has(imgKey)) {
      if (!transient && openModels.get(imgKey).transient) promoteTab(imgKey);
      focusTab(imgKey);
      return;
    }
    if (transient) evictTransient(imgKey);
    const ext      = path.slice(path.lastIndexOf('.')).toLowerCase();
    const mimeMap  = { '.svg': 'image/svg+xml', '.jpg': 'image/jpeg', '.jpeg': 'image/jpeg', '.png': 'image/png', '.gif': 'image/gif', '.bmp': 'image/bmp', '.webp': 'image/webp' };
    const mimeType = entry.mimeType || mimeMap[ext] || 'application/octet-stream';
    const bytes    = entry.binary ? b64ToBytes(entry.data) : new TextEncoder().encode(entry.text);
    const blob     = new Blob([bytes], { type: mimeType });
    const imgUrl   = URL.createObjectURL(blob);
    openModels.set(imgKey, { model: null, dirty: false, readOnly: true, imgUrl, label: path.split('/').pop(), transient });
    openOrder.push(imgKey);
    if (transient) transientTabKey = imgKey;
    focusTab(imgKey);
  }

  async function openSysPpfFile(path, transient = false) {

    if (openModels.has(key)) {
      if (!transient && openModels.get(key).transient) promoteTab(key);

      const font = ppfParse(buf);
      const { dataUrl, dimText } = ppfPreview(font);
      openModels.set(key, { model: null, dirty: false, readOnly: true, imgUrl: dataUrl, dimText, label: path.split('/').pop(), transient });

  function openUserPpfFile(path, entry, transient = false) {
    const key = 'ppf:' + path;
    if (openModels.has(key)) {
      if (!transient && openModels.get(key).transient) promoteTab(key);
      focusTab(key);
      return;
    }
    if (transient) evictTransient(key);
    try {
      const bytes = entry.binary ? b64ToBytes(entry.data) : new TextEncoder().encode(entry.text);
      const buf   = bytes.buffer.slice(bytes.byteOffset, bytes.byteOffset + bytes.byteLength);
      const font  = ppfParse(buf);
      const { dataUrl, dimText } = ppfPreview(font);
      openModels.set(key, { model: null, dirty: false, readOnly: true, imgUrl: dataUrl, dimText, label: path.split('/').pop(), transient });
      openOrder.push(key);
      if (transient) transientTabKey = key;

  async function openSysAfFile(path, transient = false) {
    const key = 'af:sys:' + path;
    if (openModels.has(key)) {
      if (!transient && openModels.get(key).transient) promoteTab(key);

    if (transient) evictTransient(key);

      const font = afParse(buf);

  function openUserAfFile(path, entry, transient = false) {
    const key = 'af:' + path;
    if (openModels.has(key)) {
      if (!transient && openModels.get(key).transient) promoteTab(key);
      focusTab(key);
      return;
    }
    if (transient) evictTransient(key);
    try {
      const bytes = entry.binary ? b64ToBytes(entry.data) : new TextEncoder().encode(entry.text);
      const buf   = bytes.buffer.slice(bytes.byteOffset, bytes.byteOffset + bytes.byteLength);
      const font  = afParse(buf);
      const { dataUrl, dimText } = afPreview(font);
      openModels.set(key, { model: null, dirty: false, readOnly: true, imgUrl: dataUrl, dimText, label: path.split('/').pop(), transient });
      openOrder.push(key);
      if (transient) transientTabKey = key;
    } catch (_) { return; }

  /* ── User-tree renderer (hierarchical, with context menu + actions) */
  function renderUserDirNode(node, pathPrefix, depth) {
    const wrap = document.createElement('div');
    if (depth > 0) wrap.className = 'dir-children';

    const entries = Object.entries(node)
      .filter(([k]) => k !== '__dir')
      .sort(([a, av], [b, bv]) => {
        const ad = av && av.__dir, bd = bv && bv.__dir;
        return (ad === bd) ? a.localeCompare(b) : (ad ? -1 : 1);
      });

    for (const [name, child] of entries) {
      const fullPath = pathPrefix + '/' + name;
      if (child && child.__dir) {
        // Directory
        const details = document.createElement('details');
        details.className = 'tree-dir';
        details.open = true;
        const summary = document.createElement('summary');
        const arrow = document.createElement('span');
        arrow.className = 'dir-arrow';
        arrow.innerHTML = '&#9658;';
        const label = document.createElement('span');
        label.textContent = name + '/';
        summary.appendChild(arrow);
        summary.appendChild(label);
        summary.addEventListener('contextmenu', e => showCtxMenu(e, fullPath, true));
        details.appendChild(summary);
        details.appendChild(renderUserDirNode(child, fullPath, depth + 1));
        wrap.appendChild(details);
      } else {
        // File
        const entry = userFS.get(fullPath);
        const row = document.createElement('div');
        row.className = 'tree-row' + (fullPath === currentFilePath ? ' active' : '');
        row.dataset.path = fullPath;
        row.title = fullPath;

        const nameSpan = document.createElement('span');
        nameSpan.className = 'row-name';
        nameSpan.textContent = name;
        nameSpan.appendChild(document.createTextNode(''));  // force text node

        const acts = document.createElement('span');
        acts.className = 'row-actions';

        const delBtn = document.createElement('button');
        delBtn.className = 'row-action ctx-danger';
        delBtn.title = 'Delete';
        delBtn.textContent = '✕';
        delBtn.addEventListener('click', e => { e.stopPropagation(); deleteUserPath(fullPath); });
        acts.appendChild(delBtn);

        row.appendChild(nameSpan);
        row.appendChild(acts);
        row.addEventListener('click',    () => openUserFile(fullPath, true));
        row.addEventListener('dblclick', () => openUserFile(fullPath, false));
        row.addEventListener('contextmenu', e => showCtxMenu(e, fullPath, false));
        wrap.appendChild(row);
      }
    }
    return wrap;
  }

  /* ── Context menu ───────────────────────────────────────────────── */
  let ctxTarget = null;  // { path, isDir }

  function showCtxMenu(e, path, isDir) {
    e.preventDefault();
    ctxTarget = { path, isDir };
    const menu = document.getElementById('file-ctx-menu');
    menu.querySelector('[data-action="open"]').style.display    = isDir ? 'none' : '';
    menu.querySelector('[data-action="new-here"]').style.display = '';
    menu.style.left    = e.clientX + 'px';
    menu.style.top     = e.clientY + 'px';
    menu.style.display = 'block';
    // Clamp within viewport
    requestAnimationFrame(() => {
      const r = menu.getBoundingClientRect();
      if (r.right  > innerWidth)  menu.style.left = (e.clientX - r.width)  + 'px';
      if (r.bottom > innerHeight) menu.style.top  = (e.clientY - r.height) + 'px';
    });
  }

  function hideCtxMenu() {
    document.getElementById('file-ctx-menu').style.display = 'none';
    ctxTarget = null;
  }

  // Capture phase: hide menu unless the click is inside the menu itself
  document.addEventListener('click', e => {
    if (!e.target.closest('#file-ctx-menu')) hideCtxMenu();
  }, true);
  document.addEventListener('contextmenu', e => {
    if (!e.target.closest('#file-ctx-menu')) hideCtxMenu();
  }, true);

  document.getElementById('file-ctx-menu').addEventListener('click', e => {
    const item = e.target.closest('.ctx-item');
    if (!item || !ctxTarget) return;
    const { path, isDir } = ctxTarget;
    hideCtxMenu();

    switch (item.dataset.action) {
      case 'open':
        openUserFile(path, false);
        break;

      case 'rename': {
        const parts   = path.split('/');
        const oldName = parts.pop();
        const dir     = parts.join('/') || '';
        const newName = prompt('Rename to:', oldName);
        if (!newName || newName === oldName) break;
        if (newName.includes('/')) { alert('File name cannot contain /'); break; }
        const newPath = dir + '/' + newName;
        if (userFS.get(newPath) && !confirm(newPath + ' already exists. Overwrite?')) break;
        if (isDir) {
          const prefix = path + '/';
          for (const p of userFS.paths()) {
            if (p !== path + '/' && !p.startsWith(prefix)) continue;
            const np = newPath + p.slice(path.length);
            userFS.set(np, userFS.get(p)); userFS.del(p);
            // Re-key any open model for this file
            if (openModels.has(p)) {
              const info = openModels.get(p);
              openModels.delete(p);
              openOrder.splice(openOrder.indexOf(p), 1, np);
              openModels.set(np, info);
              if (currentTabKey === p) { currentTabKey = np; currentFilePath = np; }
            }
          }
        } else {
          userFS.set(newPath, userFS.get(path));
          userFS.del(path);
          if (openModels.has(path)) {
            const info = openModels.get(path);
            openModels.delete(path);
            openOrder.splice(openOrder.indexOf(path), 1, newPath);
            openModels.set(newPath, info);
            if (currentTabKey === path) { currentTabKey = newPath; currentFilePath = newPath; }
          }
        }
        refreshFileTree();
        renderTabs();
        break;
      }

      case 'delete':
        deleteUserPath(path, isDir);
        break;

      case 'new-here': {
        const dir = isDir ? path : path.slice(0, path.lastIndexOf('/'));
        createUserFile(dir + '/');
        break;
      }

      case 'new-dir-here': {
        const dir = isDir ? path : path.slice(0, path.lastIndexOf('/'));
        createUserDirAt(dir);
        break;
      }
    }
  });

  function deleteUserPath(path, isDir = false) {
    const toDelete = isDir
      ? userFS.paths().filter(p => p === path + '/' || p.startsWith(path + '/'))
      : [path];
    if (!toDelete.length) return;
    const label = isDir ? path + '/ and all its contents' : path;
    if (!confirm('Delete ' + label + '?')) return;
    for (const p of toDelete) {
      userFS.del(p);
      for (const tabKey of [p, 'img:' + p]) {
        if (!openModels.has(tabKey)) continue;
        if (currentTabKey === tabKey) {
          openModels.get(tabKey).dirty = false;
          closeTab(tabKey);
        } else {
          const m = openModels.get(tabKey);
          if (m.imgUrl) URL.revokeObjectURL(m.imgUrl);
          else if (m.model) m.model.dispose();
          openModels.delete(tabKey);
          openOrder.splice(openOrder.indexOf(tabKey), 1);
        }
      }
    }
    renderTabs();
    refreshFileTree();
  }

  /* ── Render file tree ──────────────────────────────────────────── */
  function refreshFileTree() {
    // User files — hierarchical tree
    const userList = document.getElementById('fp-user-list');
    userList.innerHTML = '';
    const paths = userFS.paths();
    if (paths.length === 0) {
      userList.innerHTML = '<div class="fp-empty">No files yet.</div>';
    } else {
      const tree = buildDirTree(paths);
      userList.appendChild(renderUserDirNode(tree, '', 0));
    }

    // System tree — built once, active states updated on each call
    const sysTree = document.getElementById('fp-sys-tree');
    if (!sysTree._built) {
      sysTree._built = true;
      const tree = buildDirTree(systemPaths);
      sysTree.appendChild(renderDirNode(tree, '', 0));
    }
    sysTree.querySelectorAll('.tree-row').forEach(el => {
      el.classList.toggle('active', el.dataset.path === currentFilePath);
    });
  }

  /* ── File operations ───────────────────────────────────────────── */
  function createUserFile(dirPrefix = '/') {
    const name = prompt('File name:', 'untitled.py');
    if (!name) return;
    if (name.includes('/')) { alert('File name cannot contain /. Use the folder button to create directories.'); return; }
    const path = normalisePath(dirPrefix + name);
    if (userFS.get(path) && !confirm(path + ' already exists. Overwrite?')) return;
    userFS.set(path, { text: '', binary: false });
    refreshFileTree();
    openUserFile(path, false);
  }

  function createUserDirAt(parentPath = '') {
    const name = prompt('Folder name:', 'assets');
    if (!name) return;
    if (name.includes('/')) { alert('Folder name cannot contain /'); return; }
    const base    = parentPath.replace(/\/+$/, '');
    const dirPath = (base || '') + '/' + name + '/';
    if (!userFS.get(dirPath)) userFS.set(dirPath, { isDir: true });
    refreshFileTree();
  }

  document.getElementById('fp-new').addEventListener('click',   () => createUserFile('/'));
  document.getElementById('fp-mkdir').addEventListener('click', () => createUserDirAt(''));

  document.getElementById('fp-upload').addEventListener('click', () =>
    document.getElementById('fp-upload-input').click()
  );

  document.getElementById('fp-upload-input').addEventListener('change', async e => {
    for (const file of e.target.files) {
      const path   = normalisePath(file.name);
      const isText = TEXT_EXTS.has(path.slice(path.lastIndexOf('.'))) || file.type.startsWith('text/');
      if (isText) {
        userFS.set(path, { text: await file.text(), binary: false });
      } else {
        const buf = await file.arrayBuffer();
        userFS.set(path, { data: bytesToB64(new Uint8Array(buf)), binary: true, mimeType: file.type });
      }
    }
    refreshFileTree();
    e.target.value = '';
  });

  /* ── Auto-save / dirty tracking ───────────────────────────────── */
  editor.onDidChangeModelContent(() => {
    if (!currentTabKey) return;
    const info = openModels.get(currentTabKey);
    if (!info) return;
    // Editing a transient tab promotes it permanently
    if (info.transient) {
      info.transient = false;
      if (transientTabKey === currentTabKey) transientTabKey = null;
      renderTabs();
    }
    if (currentFilePath && !currentReadOnly) {
      // User file — auto-save silently
      userFS.set(currentFilePath, { text: editor.getValue(), binary: false });
      info.dirty = false;
    } else if (!currentReadOnly) {
      // Scratch tab — mark dirty so the user knows to save
      if (!info.dirty) { info.dirty = true; renderTabs(); }
    }
  });

  /* ── Vertical resize (user list height) ────────────────────────── */
  {
    const handle  = document.getElementById('fp-v-resize');
    const wrap    = document.getElementById('fp-user-wrap');
    const overlay = document.getElementById('drag-overlay');
    const MIN_H = 40, SYS_MIN = 80;
    let dragging = false, startY = 0, startH = 0;

    handle.addEventListener('mousedown', e => {
      dragging = true; startY = e.clientY; startH = wrap.offsetHeight;
      handle.classList.add('dragging'); overlay.classList.add('active');
      e.preventDefault();
    });
    document.addEventListener('mousemove', e => {
      if (!dragging) return;
      const panelH = document.getElementById('file-panel').clientHeight;
      const maxH   = panelH - SYS_MIN - handle.offsetHeight;
      wrap.style.height = Math.max(MIN_H, Math.min(maxH, startH + (e.clientY - startY))) + 'px';
    });
    document.addEventListener('mouseup', () => {
      if (!dragging) return;
      dragging = false; handle.classList.remove('dragging'); overlay.classList.remove('active');
    });
  }

  /* ── Left resize handle ────────────────────────────────────────── */
  {
    const handle  = document.getElementById('left-resize-handle');
    const panel   = document.getElementById('file-panel');
    const overlay = document.getElementById('drag-overlay');
    const MIN_W = 100, MAX_W = 450;
    let dragging = false, startX = 0, startW = 0;

    handle.addEventListener('mousedown', e => {
      dragging = true; startX = e.clientX; startW = panel.offsetWidth;
      handle.classList.add('dragging'); overlay.classList.add('active');
      e.preventDefault();
    });
    document.addEventListener('mousemove', e => {
      if (!dragging) return;
      panel.style.width = Math.max(MIN_W, Math.min(MAX_W, startW + (e.clientX - startX))) + 'px';
    });
    document.addEventListener('mouseup', () => {
      if (!dragging) return;
      dragging = false; handle.classList.remove('dragging'); overlay.classList.remove('active');
    });
  }

  /* Initial file tree render */
  refreshFileTree();

  /* ── Panel resize ─────────────────────────────────────────────── */
  {
    const handle   = document.getElementById('resize-handle');
    const panel    = document.getElementById('side-panel');
    const overlay  = document.getElementById('drag-overlay');
    // Canvas scales with panel width; keep it wide enough to be usable.
    const MIN_W = 220;

    let dragging = false, startX = 0, startW = 0;

    handle.addEventListener('mousedown', (e) => {
      dragging = true;
      startX   = e.clientX;
      startW   = panel.offsetWidth;
      handle.classList.add('dragging');
      overlay.classList.add('active');
      e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
      if (!dragging) return;
      const maxW  = Math.floor(window.innerWidth * 0.7);
      const newW  = Math.max(MIN_W, Math.min(maxW, startW + (startX - e.clientX)));
      panel.style.width = newW + 'px';
    });

    document.addEventListener('mouseup', () => {
      if (!dragging) return;
      dragging = false;
      handle.classList.remove('dragging');
      overlay.classList.remove('active');
    });
  }

  /* ── Auto-run on load ──────────────────────────────────────────── */
  await runCode();
});
</script>
</body>
</html>
