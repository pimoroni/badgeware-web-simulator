<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Badgeware">
  <meta name="theme-color" content="#0a141e">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <title>Badgeware Simulator</title>
  <script type="importmap">
  {
    "imports": {
      "three":          "https://cdn.jsdelivr.net/npm/three@0.172.0/build/three.module.min.js",
      "three/addons/":  "https://cdn.jsdelivr.net/npm/three@0.172.0/examples/jsm/"
    }
  }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;700&display=swap" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,400,0..1,0&display=swap" crossorigin>
  <link rel="stylesheet" href="simulator/app.css">

  <!-- Preload the internal module graph so imports don't fetch in a waterfall.
       app.js is the entry (loaded at the body bottom); these are its deps. -->
  <link rel="modulepreload" href="simulator/util.js">
  <link rel="modulepreload" href="simulator/fs.js">
  <link rel="modulepreload" href="simulator/badgeware.js">
  <link rel="modulepreload" href="simulator/badge3d.js">
  <link rel="modulepreload" href="simulator/completions.js">
  <link rel="modulepreload" href="simulator/editor.js">
  <link rel="modulepreload" href="simulator/tabs.js">
  <link rel="modulepreload" href="simulator/gallery.js">
  <link rel="modulepreload" href="simulator/ppf.js">
  <link rel="modulepreload" href="simulator/af.js">
  <link rel="modulepreload" href="simulator/resize.js">
  <link rel="modulepreload" href="simulator/filebrowser.js">
  <link rel="modulepreload" href="simulator/boot.js">
</head>
<body>

<div id="toolbar" role="toolbar" aria-label="Run controls">
  <button data-action="run" title="Run (F5)"><span class="material-symbols-outlined">play_arrow</span>Run</button>
  <button data-action="stop" title="Stop" disabled><span class="material-symbols-outlined">stop</span>Stop</button>
  <button data-action="gallery" title="Example gallery"><span class="material-symbols-outlined">grid_view</span>Examples</button>
  <button data-action="run-os" title="Run badgeOS"><span class="material-symbols-outlined">memory</span>badgeOS</button>
  <a class="buy" href="https://badgewa.re/buy" target="_blank" rel="noopener" title="Buy a badge"><span class="material-symbols-outlined">shopping_cart</span>Buy</a>
  <!-- The toolbar's right side is intentionally empty: the 3D badge spills up over it. -->
</div>


<div id="main">

  <nav id="file-panel" aria-label="Files">
    <section id="fp-user" aria-label="User files">
      <h2>
        <span>Files</span>
        <button data-action="new-file" title="New file"    aria-label="New file"><span class="material-symbols-outlined">note_add</span></button>
        <button data-action="new-dir"  title="New folder"  aria-label="New folder"><span class="material-symbols-outlined">create_new_folder</span></button>
        <button data-action="upload"   title="Upload file" aria-label="Upload file"><span class="material-symbols-outlined">upload_file</span></button>
        <input type="file" id="fp-upload-input" multiple hidden>
      </h2>
      <div id="fp-user-list"></div>
    </section>

    <div data-drag-target="fp-user" data-drag-orientation="horizontal" data-drag-min="40" data-drag-max="85%"></div>

    <section id="fp-sys" aria-label="System files">
      <h2>
        <span>System</span>
        <span class="material-symbols-outlined" title="Read-only">lock</span>
      </h2>
      <div id="fp-sys-tree"></div>
    </section>
  </nav>

  <div id="file-ctx-menu">
    <button data-action="open">Open</button>
    <button data-action="rename">Rename</button>
    <hr>
    <button data-action="new-here">New file here</button>
    <button data-action="new-dir-here">New folder here</button>
    <hr>
    <button data-action="delete">Delete</button>
  </div>

  <div data-drag-target="file-panel" data-drag-orientation="vertical" data-drag-min="160" data-drag-max="450"></div>

  <main id="editor-panel">
    <nav id="tab-bar" aria-label="Open files"></nav>
    <div id="editor"></div>
    <figure id="img-preview">
      <img alt="">
      <figcaption>
        <span></span>
        <small></small>
      </figcaption>
    </figure>
    <div id="gallery"></div>
    <div id="statusbar"><output id="status"></output></div>
  </main>

  <div data-drag-target="side-panel" data-drag-orientation="vertical" data-drag-min="220" data-drag-max="70vw" title="Drag to resize"></div>

  <aside id="side-panel" aria-label="Badge and output">
    <figure id="simulator">
      <div id="badge-3d-wrap"></div>
      <nav>
        <button data-action="spin-prev" title="Spin left"><span class="material-symbols-outlined">chevron_left</span></button>
        <button data-action="spin-next" title="Spin right"><span class="material-symbols-outlined">chevron_right</span></button>
      </nav>
      <div id="mobile-run">
        <button data-action="run" title="Run" aria-label="Run"><span class="material-symbols-outlined">play_arrow</span></button>
        <button data-action="stop" title="Stop" aria-label="Stop" disabled><span class="material-symbols-outlined">stop</span></button>
      </div>
    </figure>

    <section id="stdout">
      <h2>
        Output
        <button data-action="clear" title="Clear output"><span class="material-symbols-outlined">delete</span></button>
      </h2>
      <div></div>
    </section>
  </aside>

</div>

<nav id="mobile-nav" aria-label="View">
  <button data-tab="gallery" title="Examples" aria-label="Examples"><span class="material-symbols-outlined">grid_view</span></button>
  <button data-tab="files"   title="Files"    aria-label="Files"><span class="material-symbols-outlined">folder</span></button>
  <button data-tab="code"    title="Code"     aria-label="Code"><span class="material-symbols-outlined">code</span></button>
  <button data-tab="output"  title="Output"   aria-label="Output"><span class="material-symbols-outlined">terminal</span></button>
</nav>

<!-- Monaco ships an AMD bundle. Load its loader.js classic (so it fetches in
     parallel with the module graph), then expose a readiness promise that the app
     module awaits before building the editor — no bundler needed. -->
<script crossorigin="anonymous"
        src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
<script>
  require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' } });
  window.monacoReady = new Promise((resolve) => require(['vs/editor/editor.main'], resolve));
</script>

<!-- App entry. boot.js starts the simulator on import (OS runs while Monaco
     downloads); app.js awaits window.monacoReady, then builds the editor. -->
<script type="module" src="simulator/app.js"></script>
</body>
</html>
