<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Badgeware Simulator</title>
  <script type="importmap">
  {
    "imports": {
      "three":          "https://cdn.jsdelivr.net/npm/three@0.172.0/build/three.module.min.js",
      "three/addons/":  "https://cdn.jsdelivr.net/npm/three@0.172.0/examples/jsm/"
    }
  }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;700&display=swap" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" crossorigin>
  <link rel="stylesheet" href="simulator/app.css">
</head>
<body>

<div id="toolbar" role="toolbar" aria-label="Run controls">
  <button id="run-btn" title="Run (F5)"><span class="material-icons">play_arrow</span>Run</button>
  <button id="stop-btn" title="Stop" disabled><span class="material-icons">stop</span>Stop</button>
  <select id="example-select" title="Load example">
    <option value="">Load example&#x2026;</option>
    <option value="simulator/examples/default_code.py">default_code.py &mdash; welcome / flower</option>
    <option value="simulator/examples/hello.py">hello.py &mdash; text &amp; pen basics</option>
    <option value="simulator/examples/shapes.py">shapes.py &mdash; shape factory</option>
    <option value="simulator/examples/colors.py">colors.py &mdash; rgb / hsv</option>
    <option value="simulator/examples/buttons.py">buttons.py &mdash; reading input</option>
    <option value="simulator/examples/menu.py">menu.py &mdash; selection menu</option>
    <option value="simulator/examples/animation.py">animation.py &mdash; badge.ticks motion</option>
    <option value="simulator/examples/easing.py">easing.py &mdash; easing curves</option>
    <option value="simulator/examples/mandelbrot.py">mandelbrot.py &mdash; fractal + FPS</option>
    <option value="simulator/examples/platformer.py">platformer.py &mdash; movement &amp; gravity</option>
    <option value="simulator/examples/vectors.py">vectors.py &mdash; vec2 maths</option>
    <option value="simulator/examples/transforms.py">transforms.py &mdash; mat3 transforms</option>
    <option value="simulator/examples/gradient.py">gradient.py &mdash; brush.gradient</option>
    <option value="simulator/examples/text_layout.py">text_layout.py &mdash; word wrap</option>
    <option value="simulator/examples/scrolling_text.py">scrolling_text.py &mdash; marquee</option>
    <option value="simulator/examples/fonts.py">fonts.py &mdash; rom &amp; vector fonts</option>
    <option value="simulator/examples/images.py">images.py &mdash; load &amp; blit</option>
    <option value="simulator/examples/sprites.py">sprites.py &mdash; SpriteSheet</option>
    <option value="simulator/examples/caselights.py">caselights.py &mdash; case LEDs</option>
    <option value="simulator/examples/clock.py">clock.py &mdash; real-time clock</option>
    <option value="simulator/examples/battery.py">battery.py &mdash; hardware status</option>
    <option value="simulator/examples/state.py">state.py &mdash; saved state</option>
  </select>
  <output id="status"></output>
</div>

<div id="drag-overlay"></div>

<div id="main">

  <!-- ── File explorer ─────────────────────────────────────────── -->
  <nav id="file-panel" aria-label="Files">
    <section id="fp-user-wrap" aria-label="User files">
      <h2>
        <span>Files</span>
        <button id="fp-new"    title="New file"    aria-label="New file"><span class="material-icons">note_add</span></button>
        <button id="fp-mkdir"  title="New folder"  aria-label="New folder"><span class="material-icons">create_new_folder</span></button>
        <button id="fp-upload" title="Upload file" aria-label="Upload file"><span class="material-icons">upload_file</span></button>
        <input type="file" id="fp-upload-input" multiple hidden>
      </h2>
      <div id="fp-user-list"></div>
    </section>

    <div id="fp-v-resize"></div>

    <section id="fp-sys-wrap" aria-label="System files">
      <h2>
        <span>System</span>
        <span class="material-icons" title="Read-only">lock</span>
      </h2>
      <div id="fp-sys-tree"></div>
    </section>
  </nav>

  <!-- Shared context menu for file entries -->
  <div id="file-ctx-menu">
    <button data-action="open">Open</button>
    <button data-action="rename">Rename</button>
    <hr>
    <button data-action="new-here">New file here</button>
    <button data-action="new-dir-here">New folder here</button>
    <hr>
    <button data-action="delete">Delete</button>
  </div>

  <div id="left-resize-handle"></div>

  <!-- ── Editor (primary content) ──────────────────────────────── -->
  <main id="editor-panel">
    <div id="tab-bar"></div>
    <div id="editor"></div>
    <figure id="img-preview">
      <img id="img-preview-img" alt="">
      <figcaption>
        <span id="img-preview-name"></span>
        <span id="img-preview-dim"></span>
      </figcaption>
    </figure>
  </main>

  <div id="resize-handle" title="Drag to resize"></div>

  <!-- ── Badge view + output ───────────────────────────────────── -->
  <aside id="side-panel" aria-label="Badge and output">
    <figure id="simulator-wrap">
      <!-- BadgewareSimulator host: no canvas here (the screen renders as a DataTexture
           in the 3D view). Kept off-screen; serves as the pause/resume observer target. -->
      <div id="sim-host"></div>
      <!-- 3D badge view — buttons are interactive hit areas on the model -->
      <div id="badge-3d-wrap"></div>
      <!-- Spin the 3D badge in 180° steps -->
      <div id="badge-view-controls">
        <button id="view-prev-btn" title="Spin left"><span class="material-icons">chevron_left</span></button>
        <button id="view-next-btn" title="Spin right"><span class="material-icons">chevron_right</span></button>
      </div>
    </figure>

    <section id="stdout-wrap">
      <h2 id="stdout-header">
        Output
        <button id="clear-btn" title="Clear output">&#10005;</button>
      </h2>
      <div id="stdout"></div>
    </section>
  </aside>

</div>

<nav id="mobile-nav" aria-label="View">
  <button data-tab="files">Files</button>
  <button data-tab="code">Code</button>
  <button data-tab="output">Output</button>
</nav>

<script src="simulator/badgeware.js"></script>
<script src="simulator/fs.js"></script>
<script src="simulator/completions.js"></script>
<script src="simulator/ppf.js"></script>
<script src="simulator/af.js"></script>
<script src="simulator/editor-config.js"></script>
<script src="simulator/badge3d.js"></script>
<script src="simulator/resize.js"></script>
<script src="simulator/filebrowser.js"></script>
<script src="simulator/app.js"></script>

<!-- Monaco Editor (AMD loader) — requires CORS-eligible CDN responses.
     If the server is started with --cross (COEP require-corp) ensure your
     network can reach cdn.jsdelivr.net and that it returns CORS headers. -->
<script crossorigin="anonymous"
        src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>

<script>
require.config({
  paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' },
});

require(['vs/editor/editor.main'], async function () {
  await initApp();
});
</script>
</body>
</html>
