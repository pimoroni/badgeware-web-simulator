<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Badgeware Simulator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1e1e2e;
      color: #cdd6f4;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Toolbar ─────────────────────────────────────────────────── */
    #toolbar {
      background: #181825;
      border-bottom: 1px solid #313244;
      padding: 5px 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      user-select: none;
    }

    #toolbar h1 {
      font-size: 12px;
      font-weight: 700;
      color: #cba6f7;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .sep {
      width: 1px;
      height: 16px;
      background: #313244;
    }

    #run-btn {
      background: #a6e3a1;
      color: #1e1e2e;
      border: none;
      padding: 3px 10px 3px 8px;
      font-size: 11px;
      font-weight: 700;
      border-radius: 3px;
      cursor: pointer;
      letter-spacing: 0.03em;
    }
    #run-btn:hover { background: #94e2d5; }
    #run-btn:active { filter: brightness(0.9); }

    #example-select {
      background: #313244;
      color: #cdd6f4;
      border: 1px solid #45475a;
      padding: 3px 6px;
      font-size: 11px;
      border-radius: 3px;
      cursor: pointer;
    }
    #example-select:focus { outline: 1px solid #cba6f7; }

    #status {
      margin-left: auto;
      font-size: 11px;
      color: #6c7086;
    }

    /* ── Main layout ─────────────────────────────────────────────── */
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Editor panel ────────────────────────────────────────────── */
    #editor-panel {
      flex: 1;
      overflow: hidden;
    }

    #editor {
      width: 100%;
      height: 100%;
    }

    /* ── Side panel ──────────────────────────────────────────────── */
    #side-panel {
      width: 342px;
      flex-shrink: 0;
      border-left: 1px solid #313244;
      display: flex;
      flex-direction: column;
      background: #181825;
      overflow: hidden;
    }

    /* ── Simulator ───────────────────────────────────────────────── */
    #simulator-wrap {
      padding: 10px;
      border-bottom: 1px solid #313244;
      background: #11111b;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    #sim-label {
      font-size: 10px;
      font-weight: 600;
      color: #6c7086;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .badgeware-simulator {
      width: 320px;
      height: 240px;
      background: #000;
      position: relative;
      display: block;
      outline: 1px solid #313244;
    }

    .badgeware-simulator canvas {
      width: 320px;
      height: 240px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      display: block;
    }

    .badgeware-simulator canvas:focus {
      outline: 2px solid #cba6f7;
    }

    /* ── Output ──────────────────────────────────────────────────── */
    #stdout-wrap {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #stdout-header {
      padding: 4px 10px;
      font-size: 10px;
      font-weight: 600;
      color: #6c7086;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border-bottom: 1px solid #313244;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    #clear-btn {
      background: none;
      border: none;
      color: #585b70;
      cursor: pointer;
      font-size: 10px;
      padding: 0 2px;
      line-height: 1;
    }
    #clear-btn:hover { color: #cdd6f4; }

    #stdout {
      flex: 1;
      overflow-y: auto;
      padding: 6px 10px;
      font-family: "JetBrains Mono", "Cascadia Code", Consolas, "Courier New", monospace;
      font-size: 11px;
      line-height: 1.55;
      color: #a6e3a1;
      white-space: pre-wrap;
      word-break: break-all;
      background: #181825;
    }

    .out-dim   { color: #585b70; }
    .out-error { color: #f38ba8; }
  </style>
</head>
<body>

<div id="toolbar">
  <h1>Badgeware</h1>
  <div class="sep"></div>
  <button id="run-btn" title="Run (F5)">&#9654; Run</button>
  <select id="example-select" title="Load example">
    <option value="">Load example&#x2026;</option>
    <option value="/simulator/examples/default_code.py">default_code.py</option>
    <option value="/simulator/examples/another_code.py">another_code.py</option>
    <option value="/simulator/examples/menu.py">menu.py</option>
    <option value="/simulator/examples/file_test.py">file_test.py</option>
  </select>
  <span id="status"></span>
</div>

<div id="main">
  <div id="editor-panel">
    <div id="editor"></div>
  </div>
  <div id="side-panel">
    <div id="simulator-wrap">
      <div id="sim-label">Simulator</div>
      <div id="sim-host" class="badgeware-simulator"></div>
    </div>
    <div id="stdout-wrap">
      <div id="stdout-header">
        Output
        <button id="clear-btn" title="Clear output">&#10005;</button>
      </div>
      <div id="stdout"></div>
    </div>
  </div>
</div>

<script src="/simulator/badgeware.js"></script>

<script>

/* Helper: convert our stub entry → Monaco CompletionItem */
function toCompletionItem(entry, range, monaco) {
  const K = monaco.languages.CompletionItemKind;
  const kindMap = {
    Constant: K.Constant,
    Variable: K.Variable,
    Module:   K.Module,
    Class:    K.Class,
    Function: K.Function,
    Method:   K.Method,
    Property: K.Property,
  };

  const insertText = entry.insertText ?? entry.label;
  const isSnippet  = insertText.includes('${');

  return {
    label:             entry.label,
    kind:              kindMap[entry.kind] ?? K.Variable,
    detail:            entry.detail,
    documentation:     entry.doc,
    insertText,
    insertTextRules:   isSnippet
      ? monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet
      : undefined,
    range,
  };
}

<!-- Monaco Editor (AMD loader) — requires CORS-eligible CDN responses.
     If the server is started with --cross (COEP require-corp) ensure your
     network can reach cdn.jsdelivr.net and that it returns CORS headers. -->
<script crossorigin="anonymous"
        src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>

<script>
require.config({
  paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' },
});

require(['vs/editor/editor.main'], async function () {

  /* ── Completion provider ───────────────────────────────────────── */
  monaco.languages.registerCompletionItemProvider('python', {
    triggerCharacters: ['.'],

    provideCompletionItems(model, position) {
      const linePrefix = model.getValueInRange({
        startLineNumber: position.lineNumber,
        startColumn: 1,
        endLineNumber: position.lineNumber,
        endColumn: position.column,
      });

      // Detect "identifier." at end of typed text
      const dotMatch = linePrefix.match(/(\w+)\.\s*$/);

      if (dotMatch) {
        const members = MEMBERS[dotMatch[1]];
        if (members) {
          const word  = model.getWordUntilPosition(position);
          const range = {
            startLineNumber: position.lineNumber,
            startColumn:     word.startColumn,
            endLineNumber:   position.lineNumber,
            endColumn:       word.endColumn,
          };
          return { suggestions: members.map(m => toCompletionItem(m, range, monaco)) };
        }
        // Unknown object after a dot — let Monaco handle it
        return { suggestions: [] };
      }

      // Global completions
      const word  = model.getWordUntilPosition(position);
      const range = {
        startLineNumber: position.lineNumber,
        startColumn:     word.startColumn,
        endLineNumber:   position.lineNumber,
        endColumn:       word.endColumn,
      };
      return { suggestions: BADGEWARE_GLOBALS.map(m => toCompletionItem(m, range, monaco)) };
    },
  });

  /* ── Editor ────────────────────────────────────────────────────── */
  const editor = monaco.editor.create(document.getElementById('editor'), {
    value:          '# Loading…',
    language:       'python',
    theme:          'vs-dark',
    fontSize:       14,
    fontFamily:     '"JetBrains Mono", "Cascadia Code", "Fira Code", Consolas, monospace',
    fontLigatures:  true,
    minimap:        { enabled: false },
    scrollBeyondLastLine: false,
    lineNumbers:    'on',
    tabSize:        2,
    insertSpaces:   true,
    automaticLayout: true,
    wordWrap:       'off',
    renderLineHighlight: 'line',
    suggestOnTriggerCharacters: true,
    quickSuggestions: { other: true, comments: false, strings: false },
    parameterHints: { enabled: true },
  });

  // Load default example into the editor
  const defaultCode = await fetch('/simulator/examples/default_code.py')
    .then(r => r.ok ? r.text() : null)
    .catch(() => null)
    ?? 'badge.mode(HIRES)\n\ndef update():\n    screen.text("Hello!", 10, 10)\n';

  editor.setValue(defaultCode);

  /* ── Simulator ─────────────────────────────────────────────────── */
  const simHost   = document.getElementById('sim-host');
  const stdoutEl  = document.getElementById('stdout');
  const statusEl  = document.getElementById('status');

  const simulator = await BadgewareSimulator(simHost);

  const appendOut = (text, cls) => {
    const span = document.createElement('span');
    span.textContent = text + '\n';
    if (cls) span.className = cls;
    stdoutEl.appendChild(span);
    stdoutEl.scrollTop = stdoutEl.scrollHeight;
  };

  // Override the simulator's stdout handler
  simulator.stdout = async (text) => appendOut(text);

  /* ── Run action ────────────────────────────────────────────────── */
  const runCode = async () => {
    const code = editor.getValue();
    stdoutEl.innerHTML = '';
    appendOut('▶ Running…', 'out-dim');
    statusEl.textContent = 'Running…';
    try {
      await simulator.run(code);
      statusEl.textContent = '';
    } catch (err) {
      appendOut('✕ ' + err, 'out-error');
      statusEl.textContent = 'Error';
    }
  };

  // F5 keybinding inside the editor
  editor.addAction({
    id:                   'badgeware.run',
    label:                'Run in Simulator',
    keybindings:          [monaco.KeyCode.F5],
    contextMenuGroupId:   'navigation',
    contextMenuOrder:     1,
    run:                  runCode,
  });

  /* ── Toolbar wiring ────────────────────────────────────────────── */
  document.getElementById('run-btn').addEventListener('click', runCode);

  document.getElementById('example-select').addEventListener('change', async (e) => {
    if (!e.target.value) return;
    const code = await fetch(e.target.value)
      .then(r => r.ok ? r.text() : null)
      .catch(() => null);
    if (code != null) editor.setValue(code);
    e.target.value = '';
  });

  document.getElementById('clear-btn').addEventListener('click', () => {
    stdoutEl.innerHTML = '';
  });

  /* ── Auto-run on load ──────────────────────────────────────────── */
  await runCode();
});
</script>
</body>
</html>
