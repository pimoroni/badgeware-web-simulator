<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Badgeware">
  <meta name="theme-color" content="#0a141e">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <title>Badgeware Simulator</title>
  <script type="importmap">
  {
    "imports": {
      "three":          "https://cdn.jsdelivr.net/npm/three@0.172.0/build/three.module.min.js",
      "three/addons/":  "https://cdn.jsdelivr.net/npm/three@0.172.0/examples/jsm/"
    }
  }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;700&display=swap" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" crossorigin>
  <link rel="stylesheet" href="simulator/app.css">
</head>
<body>

<div id="toolbar" role="toolbar" aria-label="Run controls">
  <button data-action="run" title="Run (F5)"><span class="material-icons">play_arrow</span>Run</button>
  <button data-action="stop" title="Stop" disabled><span class="material-icons">stop</span>Stop</button>
  <button data-action="gallery" title="Example gallery"><span class="material-icons">grid_view</span>Examples</button>
  <button data-action="run-os" title="Run badgeOS"><span class="material-icons">memory</span>badgeOS</button>
  <output id="status"></output>
</div>


<div id="main">

  <nav id="file-panel" aria-label="Files">
    <section id="fp-user" aria-label="User files">
      <h2>
        <span>Files</span>
        <button data-action="new-file" title="New file"    aria-label="New file"><span class="material-icons">note_add</span></button>
        <button data-action="new-dir"  title="New folder"  aria-label="New folder"><span class="material-icons">create_new_folder</span></button>
        <button data-action="upload"   title="Upload file" aria-label="Upload file"><span class="material-icons">upload_file</span></button>
        <input type="file" id="fp-upload-input" multiple hidden>
      </h2>
      <div id="fp-user-list"></div>
    </section>

    <div data-drag-target="fp-user" data-drag-orientation="horizontal" data-drag-min="40" data-drag-max="85%"></div>

    <section id="fp-sys" aria-label="System files">
      <h2>
        <span>System</span>
        <span class="material-icons" title="Read-only">lock</span>
      </h2>
      <div id="fp-sys-tree"></div>
    </section>
  </nav>

  <div id="file-ctx-menu">
    <button data-action="open">Open</button>
    <button data-action="rename">Rename</button>
    <hr>
    <button data-action="new-here">New file here</button>
    <button data-action="new-dir-here">New folder here</button>
    <hr>
    <button data-action="delete">Delete</button>
  </div>

  <div data-drag-target="file-panel" data-drag-orientation="vertical" data-drag-min="160" data-drag-max="450"></div>

  <main id="editor-panel">
    <nav id="tab-bar" aria-label="Open files"></nav>
    <div id="editor"></div>
    <figure id="img-preview">
      <img alt="">
      <figcaption>
        <span></span>
        <small></small>
      </figcaption>
    </figure>
    <div id="gallery"></div>
  </main>

  <div data-drag-target="side-panel" data-drag-orientation="vertical" data-drag-min="220" data-drag-max="70vw" title="Drag to resize"></div>

  <aside id="side-panel" aria-label="Badge and output">
    <figure id="simulator">
      <div id="badge-3d-wrap"></div>
      <nav>
        <button data-action="spin-prev" title="Spin left"><span class="material-icons">chevron_left</span></button>
        <button data-action="spin-next" title="Spin right"><span class="material-icons">chevron_right</span></button>
      </nav>
      <div id="mobile-run">
        <button data-action="run" title="Run" aria-label="Run"><span class="material-icons">play_arrow</span></button>
        <button data-action="stop" title="Stop" aria-label="Stop" disabled><span class="material-icons">stop</span></button>
      </div>
    </figure>

    <section id="stdout">
      <h2>
        Output
        <button data-action="clear" title="Clear output"><span class="material-icons">delete</span></button>
      </h2>
      <div></div>
    </section>
  </aside>

</div>

<nav id="mobile-nav" aria-label="View">
  <button data-tab="gallery" title="Examples" aria-label="Examples"><span class="material-icons">grid_view</span></button>
  <button data-tab="files"   title="Files"    aria-label="Files"><span class="material-icons">folder</span></button>
  <button data-tab="code"    title="Code"     aria-label="Code"><span class="material-icons">code</span></button>
  <button data-tab="output"  title="Output"   aria-label="Output"><span class="material-icons">terminal</span></button>
</nav>

<script src="simulator/badgeware.js"></script>
<script src="simulator/fs.js"></script>
<script src="simulator/completions.js"></script>
<script src="simulator/ppf.js"></script>
<script src="simulator/af.js"></script>
<script src="simulator/editor-config.js"></script>
<script src="simulator/badge3d.js"></script>
<script src="simulator/resize.js"></script>
<script src="simulator/filebrowser.js"></script>
<script src="simulator/boot.js"></script>
<script src="simulator/app.js"></script>

<script crossorigin="anonymous"
        src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>

<script>
require.config({
  paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' },
});

require(['vs/editor/editor.main'], async function () {
  await initApp();
});
</script>
</body>
</html>
