<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Badgeware Simulator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;700&display=swap" crossorigin>
  <style>
    :root {
      --bg:          rgb(10, 20, 30);
      --panel:       rgba(20, 30, 40, 0.6);
      --border:      rgba(180, 190, 200, 0.12);
      --white:       rgba(235, 245, 255);
      --faint:       rgba(180, 190, 200);
      --orange:      rgb(224, 137, 32);
      --green:       rgb(32, 224, 70);
      --blue:        rgb(32, 189, 224);
      --faint-orange:rgba(224, 137, 32, 0.15);
      --faint-green: rgba(32, 224, 70,  0.12);
      --faint-white: rgba(235, 245, 255, 0.5);
      --dim:         rgba(180, 190, 200, 0.4);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: Lexend, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      font-weight: 300;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Toolbar ─────────────────────────────────────────────────── */
    #toolbar {
      background: rgba(10, 20, 30, 0.85);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(1rem);
      padding: 6px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      user-select: none;
    }

    #run-btn {
      background: var(--orange);
      color: rgb(10, 20, 30);
      border: none;
      padding: 4px 14px 4px 10px;
      font-size: 12px;
      font-weight: 700;
      font-family: inherit;
      border-radius: 0.4rem;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: filter 0.1s;
    }
    #run-btn:hover  { filter: brightness(1.15); }
    #run-btn:active { filter: brightness(0.9); }

    #example-select {
      background: var(--panel);
      color: var(--white);
      border: 1px solid var(--border);
      padding: 4px 8px;
      font-size: 12px;
      font-family: inherit;
      font-weight: 300;
      border-radius: 0.4rem;
      cursor: pointer;
    }
    #example-select:focus { outline: 1px solid var(--orange); }

    #status {
      margin-left: auto;
      font-size: 11px;
      color: var(--dim);
    }

    /* ── Main layout ─────────────────────────────────────────────── */
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Editor panel ────────────────────────────────────────────── */
    #editor-panel {
      flex: 1;
      overflow: hidden;
    }

    #editor {
      width: 100%;
      height: 100%;
    }

    /* ── Resize handle ───────────────────────────────────────────── */
    #resize-handle {
      width: 4px;
      flex-shrink: 0;
      background: var(--border);
      cursor: col-resize;
      transition: background 0.15s;
      position: relative;
    }
    /* Widen the hit area without changing the visual strip */
    #resize-handle::after {
      content: '';
      position: absolute;
      inset: 0 -4px;
    }
    #resize-handle:hover,
    #resize-handle.dragging { background: rgba(224, 137, 32, 0.5); }

    /* Transparent overlay absorbs pointer events from Monaco + canvas during drag */
    #drag-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      cursor: col-resize;
    }
    #drag-overlay.active { display: block; }

    /* ── Side panel ──────────────────────────────────────────────── */
    #side-panel {
      width: 342px;
      flex-shrink: 0;
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      background: var(--panel);
      overflow: hidden;
    }

    /* ── Simulator ───────────────────────────────────────────────── */
    #simulator-wrap {
      padding: 12px;
      border-bottom: 1px solid var(--border);
      background: rgba(10, 20, 30, 0.6);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #sim-label {
      font-size: 10px;
      font-weight: 400;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .badgeware-simulator {
      width: 100%;
      aspect-ratio: 320 / 240;
      background: #000;
      position: relative;
      display: block;
      outline: 1px solid rgba(224, 137, 32, 0.3);
    }

    .badgeware-simulator canvas {
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      display: block;
    }

    .badgeware-simulator canvas:focus {
      outline: 2px solid var(--orange);
    }

    /* ── Output ──────────────────────────────────────────────────── */
    #stdout-wrap {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #stdout-header {
      padding: 5px 12px;
      font-size: 10px;
      font-weight: 400;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    #clear-btn {
      background: none;
      border: none;
      color: var(--dim);
      cursor: pointer;
      font-size: 10px;
      font-family: inherit;
      padding: 0 2px;
      line-height: 1;
      transition: color 0.15s;
    }
    #clear-btn:hover { color: var(--white); }

    #stdout {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px;
      font-family: Consolas, "Cascadia Code", "JetBrains Mono", "Courier New", monospace;
      font-size: 11px;
      line-height: 1.6;
      color: var(--green);
      white-space: pre-wrap;
      word-break: break-all;
      background: transparent;
    }

    #stdout::-webkit-scrollbar       { width: 6px; }
    #stdout::-webkit-scrollbar-track { background: transparent; }
    #stdout::-webkit-scrollbar-thumb { background: rgba(180,190,200,0.15); border-radius: 3px; }

    .out-dim   { color: var(--dim); }
    .out-error { color: rgba(240, 141, 73, 1); }
  </style>
</head>
<body>

<div id="toolbar">
  <button id="run-btn" title="Run (F5)">&#9654; Run</button>
  <select id="example-select" title="Load example">
    <option value="">Load example&#x2026;</option>
    <option value="/simulator/examples/default_code.py">default_code.py</option>
    <option value="/simulator/examples/another_code.py">another_code.py</option>
    <option value="/simulator/examples/menu.py">menu.py</option>
    <option value="/simulator/examples/file_test.py">file_test.py</option>
  </select>
  <span id="status"></span>
</div>

<div id="drag-overlay"></div>

<div id="main">
  <div id="editor-panel">
    <div id="editor"></div>
  </div>
  <div id="resize-handle" title="Drag to resize"></div>
  <div id="side-panel">
    <div id="simulator-wrap">
      <div id="sim-label">Simulator</div>
      <div id="sim-host" class="badgeware-simulator"></div>
    </div>
    <div id="stdout-wrap">
      <div id="stdout-header">
        Output
        <button id="clear-btn" title="Clear output">&#10005;</button>
      </div>
      <div id="stdout"></div>
    </div>
  </div>
</div>

<script src="/simulator/badgeware.js"></script>

<script>
/* ─────────────────────────────────────────────────────────────────────────
   Badgeware API stubs — used by the Monaco completion provider.
   Derived from:
     simulator/filesystem/badgeware/__init__.py
     simulator/filesystem/badgeware/badge.py
     simulator/filesystem/badgeware/text.py
     simulator/filesystem/badgeware/sprite.py
     simulator/filesystem/badgeware/math.py
     simulator/filesystem/badgeware/state.py
     simulator/filesystem/badgeware/rtc.py
     simulator/filesystem/badgeware/memory.py
     simulator/filesystem/badgeware/filesystem.py
   ───────────────────────────────────────────────────────────────────────── */

const BADGEWARE_GLOBALS = [

  { label: 'BUTTON_B',      kind: 'Constant', detail: '0b001000', doc: 'Button B (select / middle).' },
  { label: 'BUTTON_C',      kind: 'Constant', detail: '0b000100', doc: 'Button C (right side button).' },

  { label: 'BUTTON_DOWN',   kind: 'Constant', detail: '0b000001', doc: 'D-pad Down.' },
  { label: 'BUTTON_HOME',   kind: 'Constant', detail: '0b100000', doc: 'Home / Boot button.' },

  // ── Global instances ───────────────────────────────────────────
  { label: 'screen',   kind: 'Variable', detail: 'image',     doc: 'The active display canvas (image instance). 160×120 in LORES, 320×240 in HIRES. Set screen.pen and call screen.clear(), screen.text(), screen.shape().' },

  { label: 'rtc',      kind: 'Variable', detail: 'RTC',       doc: 'Real-time clock: get/set datetime, alarms, countdown timers.' },
  { label: 'loop',     kind: 'Variable', detail: '_run | None', doc: 'Current animation loop context (None outside a loop). Provides loop.ticks and loop.progress.' },

  // ── Types / constructors ───────────────────────────────────────
  { label: 'vec2',          kind: 'Class', insertText: 'vec2(${1:x}, ${2:y})',
    doc: '2D vector / point. Fields: .x, .y\nUsage: pos = vec2(80, 60)' },
  { label: 'rect',          kind: 'Class', insertText: 'rect(${1:x}, ${2:y}, ${3:w}, ${4:h})',
    doc: 'Rectangle. Fields: .x, .y, .w, .h\nUsage: bounds = rect(0, 0, 160, 120)' },
  { label: 'image',         kind: 'Class', insertText: 'image(${1:width}, ${2:height})',
    doc: 'Off-screen image buffer. Also a namespace: image.load(file), image.OFF / X2 / X4.' },
  { label: 'font',          kind: 'Class', insertText: 'font.load(${1:"path.af"})',
    doc: 'Vector font (.af files). Load with font.load(path).' },
  { label: 'pixel_font',    kind: 'Class', insertText: 'pixel_font.load(${1:"path.ppf"})',
    doc: 'Bitmap / pixel font (.ppf files). Load with pixel_font.load(path).' },
  { label: 'run',           kind: 'Class', insertText: 'run(${1:update})',
    doc: 'Run an animation loop. Use as a decorator @run or call run(fn). Optional: run(duration=ms).\nThe update() function is called every frame; return a value to exit.' },
  { label: 'SpriteSheet',   kind: 'Class', insertText: 'SpriteSheet(${1:file}, ${2:columns}, ${3:rows})',
    doc: 'Load a sprite sheet image. Args: file (path), columns (int), rows (int).\nAccess sprites via .sprite(x, y) or animations via .animation(x, y, count).' },
  { label: 'AnimatedSprite', kind: 'Class',

  // ── Global functions ───────────────────────────────────────────

  { label: 'rnd',           kind: 'Function', insertText: 'rnd(${1:v1})',

  { label: 'launch',        kind: 'Function', insertText: 'launch(${1:path})',
    doc: 'Launch an app module at the given path. Calls on_exit() if defined.' },

  { label: 'set_brightness', kind: 'Function', insertText: 'set_brightness(${1:value})',
    doc: 'Set display backlight brightness. value: 0.0 (off) – 1.0 (full).' },
  { label: 'message',       kind: 'Function', insertText: 'message(${1:"title"}, ${2:"msg"})',
    doc: 'Draw an overlay message box. Args: title (str), msg (str), window=None.' },
  { label: 'fatal_error',   kind: 'Function', insertText: 'fatal_error(${1:"title"}, ${2:error})',

    doc: 'Returns True if the path exists.' },
  { label: 'is_dir',        kind: 'Function', insertText: 'is_dir(${1:path})',
    doc: 'Returns True if the path is a directory.' },
  { label: 'free',          kind: 'Function', insertText: 'free()',
    doc: 'Print free heap memory in KB (with delta). Calls gc.collect() first.' },

/* Member completions, keyed by the identifier before the dot. */
const MEMBERS = {

    { label: 'pen',          kind: 'Property', doc: 'Current draw color. Assign a color value: screen.pen = color.rgb(255, 0, 0).' },
    { label: 'font',         kind: 'Property', doc: 'Current font (pixel_font or font instance). Default: rom_font.sins.' },
    { label: 'clip',         kind: 'Property', doc: 'Current clip rect (rect). Assign to restrict drawing area.' },
    { label: 'antialias',    kind: 'Property', doc: 'Anti-aliasing mode: OFF, X2, or X4.' },
    { label: 'clear',        kind: 'Method', insertText: 'clear()',
      doc: 'Fill the screen with the current pen color.' },
    { label: 'text',         kind: 'Method', insertText: 'text(${1:text}, ${2:x}, ${3:y})',
      doc: 'Draw text string at position (x, y). Pass font size as 4th arg for vector fonts.' },
    { label: 'shape',        kind: 'Method', insertText: 'shape(${1:poly})',
      doc: 'Draw a filled polygon (returned by shape.* constructors).' },
    { label: 'blit',         kind: 'Method', insertText: 'blit(${1:source}, ${2:pos})',
      doc: 'Blit another image onto this one. Args: source (image), pos (vec2 or rect).' },
    { label: 'window',       kind: 'Method', insertText: 'window(${1:x}, ${2:y}, ${3:w}, ${4:h})',
      doc: 'Create a sub-image view of this canvas. Returns an image.' },
    { label: 'measure_text', kind: 'Method', insertText: 'measure_text(${1:text})',
      doc: 'Measure text in the current font. Returns (width, height).' },
    { label: 'line',         kind: 'Method', insertText: 'line(${1:x1}, ${2:y1}, ${3:x2}, ${4:y2})',
      doc: 'Draw a line from (x1,y1) to (x2,y2) with the current pen.' },
  ],

  badge: [
    { label: 'mode',          kind: 'Method', insertText: 'mode(${1:LORES | VSYNC})',
      doc: 'Get or set the display mode. Combine flags with |:\n  LORES (160×120), HIRES (320×240), VSYNC\n  FAST_UPDATE, FULL_UPDATE, MEDIUM_UPDATE, DITHER' },

    { label: 'held',          kind: 'Method', insertText: 'held()',
      doc: 'Buttons currently held. Returns a set, or True/False when a button constant is passed.' },
    { label: 'released',      kind: 'Method', insertText: 'released()',
      doc: 'Buttons released this frame. Returns a set, or True/False when a button constant is passed.' },

    { label: 'uid',           kind: 'Property', doc: 'Unique hardware ID (hex string).' },
    { label: 'resolution',    kind: 'Property', doc: '(width, height) tuple for the current display mode.' },
    { label: 'default_pen',   kind: 'Property', doc: 'Default pen color restored by badge.clear().' },
    { label: 'default_clear', kind: 'Property', doc: 'Background fill color used by badge.clear().' },
    { label: 'battery_voltage', kind: 'Method', insertText: 'battery_voltage()',
      doc: 'Battery voltage in volts (float).' },
    { label: 'battery_level', kind: 'Method', insertText: 'battery_level()',
      doc: 'Estimated battery percentage 0–100 (int).' },
    { label: 'usb_connected', kind: 'Method', insertText: 'usb_connected()',
      doc: 'True if a USB cable is connected (bool).' },
    { label: 'is_charging',   kind: 'Method', insertText: 'is_charging()',
      doc: 'True if the battery is currently charging (bool). Requires USB to be connected.' },

    { label: 'woken_by_button', kind: 'Method', insertText: 'woken_by_button()',
      doc: 'True if the badge was woken by a button press (bool).' },
    { label: 'pressed_to_wake', kind: 'Method', insertText: 'pressed_to_wake(${1:button})',
      doc: 'True if a specific button triggered the wake. Args: button constant.' },
    { label: 'woken_by_reset', kind: 'Method', insertText: 'woken_by_reset()',
      doc: 'True if woken by hardware reset (bool).' },

  shape: [
    { label: 'rectangle',        kind: 'Function', insertText: 'rectangle(${1:x}, ${2:y}, ${3:w}, ${4:h})',
      doc: 'Filled rectangle polygon. Args: x, y, width, height.' },
    { label: 'rounded_rectangle', kind: 'Function',
      insertText: 'rounded_rectangle(${1:x}, ${2:y}, ${3:w}, ${4:h}, ${5:r1}, ${6:r2}, ${7:r3}, ${8:r4})',
      doc: 'Rounded rectangle. Args: x, y, w, h, corner radii (TL, TR, BR, BL).' },

  ],

  color: [
    { label: 'rgb',   kind: 'Function', insertText: 'rgb(${1:r}, ${2:g}, ${3:b})',
      doc: 'Create a color from RGB values (0–255 each). Optional 4th arg: alpha (0–255).' },
    { label: 'hsv',   kind: 'Function', insertText: 'hsv(${1:h}, ${2:s}, ${3:v})',
      doc: 'Create a color from HSV components (0.0–1.0 each).' },
    { label: 'white', kind: 'Property', doc: 'White color constant.' },
    { label: 'black', kind: 'Property', doc: 'Black color constant.' },
    { label: 'red',   kind: 'Property', doc: 'Red color constant.' },
    { label: 'green', kind: 'Property', doc: 'Green color constant.' },
    { label: 'blue',  kind: 'Property', doc: 'Blue color constant.' },
  ],

  text: [
    { label: 'draw',     kind: 'Method',
      insertText: 'draw(${1:image}, ${2:text})',
      doc: 'Draw word-wrapped text into an image.\nArgs: image, text (str), bounds=None (rect), line_spacing=1, word_spacing=1, size=24.\nReturns the bounding rect of drawn text.' },

/* Helper: convert our stub entry → Monaco CompletionItem */
function toCompletionItem(entry, range, monaco) {
  const K = monaco.languages.CompletionItemKind;
  const kindMap = {
    Constant: K.Constant,
    Variable: K.Variable,
    Module:   K.Module,
    Class:    K.Class,
    Function: K.Function,
    Method:   K.Method,
    Property: K.Property,
  };

  const insertText = entry.insertText ?? entry.label;
  const isSnippet  = insertText.includes('${');

  return {
    label:             entry.label,
    kind:              kindMap[entry.kind] ?? K.Variable,
    detail:            entry.detail,
    documentation:     entry.doc,
    insertText,
    insertTextRules:   isSnippet
      ? monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet
      : undefined,
    range,
  };
}

<!-- Monaco Editor (AMD loader) — requires CORS-eligible CDN responses.
     If the server is started with --cross (COEP require-corp) ensure your
     network can reach cdn.jsdelivr.net and that it returns CORS headers. -->
<script crossorigin="anonymous"
        src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>

<script>
require.config({
  paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' },
});

require(['vs/editor/editor.main'], async function () {

  /* ── Completion provider ───────────────────────────────────────── */
  monaco.languages.registerCompletionItemProvider('python', {
    triggerCharacters: ['.'],

    provideCompletionItems(model, position) {
      const linePrefix = model.getValueInRange({
        startLineNumber: position.lineNumber,
        startColumn: 1,
        endLineNumber: position.lineNumber,
        endColumn: position.column,
      });

      // Detect "identifier." at end of typed text
      const dotMatch = linePrefix.match(/(\w+)\.\s*$/);

      if (dotMatch) {
        const members = MEMBERS[dotMatch[1]];
        if (members) {
          const word  = model.getWordUntilPosition(position);
          const range = {
            startLineNumber: position.lineNumber,
            startColumn:     word.startColumn,
            endLineNumber:   position.lineNumber,
            endColumn:       word.endColumn,
          };
          return { suggestions: members.map(m => toCompletionItem(m, range, monaco)) };
        }
        // Unknown object after a dot — let Monaco handle it
        return { suggestions: [] };
      }

      // Global completions
      const word  = model.getWordUntilPosition(position);
      const range = {
        startLineNumber: position.lineNumber,
        startColumn:     word.startColumn,
        endLineNumber:   position.lineNumber,
        endColumn:       word.endColumn,
      };
      return { suggestions: BADGEWARE_GLOBALS.map(m => toCompletionItem(m, range, monaco)) };
    },
  });

  /* ── Custom theme (badgewa.re palette + Prism Tomorrow syntax) ─── */
  monaco.editor.defineTheme('badgeware', {
    base:    'vs-dark',
    inherit: true,
    rules: [
      { token: '',                   foreground: 'ebf5ff' },
      { token: 'comment',            foreground: '4a6070', fontStyle: 'italic' },
      { token: 'string',             foreground: '7ec699' },
      { token: 'string.escape',      foreground: 'b4dfc4' },
      { token: 'keyword',            foreground: 'cc99cd' },
      { token: 'keyword.operator',   foreground: '67cdcc' },
      { token: 'number',             foreground: 'f08d49' },
      { token: 'number.float',       foreground: 'f08d49' },
      { token: 'operator',           foreground: '67cdcc' },
      { token: 'delimiter',          foreground: 'b4bcc8' },
      { token: 'delimiter.parenthesis', foreground: 'b4bcc8' },
      { token: 'delimiter.bracket',  foreground: 'b4bcc8' },
      { token: 'type',               foreground: '6196cc' },
      { token: 'identifier',         foreground: 'ebf5ff' },
      { token: 'invalid',            foreground: 'e2777a' },
    ],
    colors: {
      'editor.background':                   '#0a141e',
      'editor.foreground':                   '#ebf5ff',
      'editor.lineHighlightBackground':      '#0d1924',
      'editor.lineHighlightBorder':          '#00000000',
      'editor.selectionBackground':          '#e0892030',
      'editor.selectionHighlightBackground': '#e0892018',
      'editor.inactiveSelectionBackground':  '#e0892018',
      'editor.findMatchBackground':          '#e0892055',
      'editor.findMatchHighlightBackground': '#e0892028',
      'editorLineNumber.foreground':         '#1e3040',
      'editorLineNumber.activeForeground':   '#6a8090',
      'editorCursor.foreground':             '#e08920',
      'editorIndentGuide.background1':       '#0d1a26',
      'editorIndentGuide.activeBackground1': '#1a2d3e',
      'editorRuler.foreground':              '#0d1a26',
      'editorBracketMatch.background':       '#e0892028',
      'editorBracketMatch.border':           '#e08920',
      'editorOverviewRuler.border':          '#0a141e',
      'scrollbarSlider.background':          '#1a2838aa',
      'scrollbarSlider.hoverBackground':     '#1a2838dd',
      'scrollbarSlider.activeBackground':    '#e0892040',
      /* Autocomplete / suggestion widget */
      'editorWidget.background':             '#0c1a26',
      'editorWidget.border':                 '#1a2d3e',
      'editorSuggestWidget.background':      '#0c1a26',
      'editorSuggestWidget.border':          '#1a2d3e',
      'editorSuggestWidget.foreground':      '#ebf5ff',
      'editorSuggestWidget.selectedBackground':      '#1a2d3a',
      'editorSuggestWidget.selectedForeground':      '#ebf5ff',
      'editorSuggestWidget.highlightForeground':     '#e08920',
      'editorSuggestWidget.focusHighlightForeground':'#e08920',
      /* Hover / parameter hints */
      'editorHoverWidget.background':        '#0c1a26',
      'editorHoverWidget.border':            '#1a2d3e',
      /* List selections inside widgets */
      'list.focusBackground':                '#1a2d3a',
      'list.hoverBackground':                '#0f1e2c',
      'list.activeSelectionBackground':      '#1a2d3a',
      'list.activeSelectionForeground':      '#ebf5ff',
      'list.inactiveSelectionBackground':    '#0f1e2c',
      'list.highlightForeground':            '#e08920',
    },
  });

  /* ── Editor ────────────────────────────────────────────────────── */
  const editor = monaco.editor.create(document.getElementById('editor'), {
    value:          '# Loading…',
    language:       'python',
    theme:          'badgeware',
    fontSize:       14,
    fontFamily:     '"JetBrains Mono", "Cascadia Code", "Fira Code", Consolas, monospace',
    fontLigatures:  true,
    minimap:        { enabled: false },
    scrollBeyondLastLine: false,
    lineNumbers:    'on',
    tabSize:        2,
    insertSpaces:   true,
    automaticLayout: true,
    wordWrap:       'off',
    renderLineHighlight: 'line',
    suggestOnTriggerCharacters: true,
    quickSuggestions: { other: true, comments: false, strings: false },
    parameterHints: { enabled: true },
  });

  // Load default example into the editor
  const defaultCode = await fetch('/simulator/examples/default_code.py')
    .then(r => r.ok ? r.text() : null)
    .catch(() => null)
    ?? 'badge.mode(HIRES)\n\ndef update():\n    screen.text("Hello!", 10, 10)\n';

  editor.setValue(defaultCode);

  /* ── Simulator ─────────────────────────────────────────────────── */
  const simHost   = document.getElementById('sim-host');
  const stdoutEl  = document.getElementById('stdout');
  const statusEl  = document.getElementById('status');

  const simulator = await BadgewareSimulator(simHost);

  const appendOut = (text, cls) => {
    const span = document.createElement('span');
    span.textContent = text + '\n';
    if (cls) span.className = cls;
    stdoutEl.appendChild(span);
    stdoutEl.scrollTop = stdoutEl.scrollHeight;
  };

  // Override the simulator's stdout handler
  simulator.stdout = async (text) => appendOut(text);

  /* ── Run action ────────────────────────────────────────────────── */
  const runCode = async () => {
    const code = editor.getValue();
    stdoutEl.innerHTML = '';
    appendOut('▶ Running…', 'out-dim');
    statusEl.textContent = 'Running…';
    try {
      await simulator.run(code);
      statusEl.textContent = '';
    } catch (err) {
      appendOut('✕ ' + err, 'out-error');
      statusEl.textContent = 'Error';
    }
  };

  // F5 keybinding inside the editor
  editor.addAction({
    id:                   'badgeware.run',
    label:                'Run in Simulator',
    keybindings:          [monaco.KeyCode.F5],
    contextMenuGroupId:   'navigation',
    contextMenuOrder:     1,
    run:                  runCode,
  });

  /* ── Toolbar wiring ────────────────────────────────────────────── */
  document.getElementById('run-btn').addEventListener('click', runCode);

  document.getElementById('example-select').addEventListener('change', async (e) => {
    if (!e.target.value) return;
    const code = await fetch(e.target.value)
      .then(r => r.ok ? r.text() : null)
      .catch(() => null);
    if (code != null) editor.setValue(code);
    e.target.value = '';
  });

  document.getElementById('clear-btn').addEventListener('click', () => {
    stdoutEl.innerHTML = '';
  });

  /* ── Panel resize ─────────────────────────────────────────────── */
  {
    const handle   = document.getElementById('resize-handle');
    const panel    = document.getElementById('side-panel');
    const overlay  = document.getElementById('drag-overlay');
    // Canvas scales with panel width; keep it wide enough to be usable.
    const MIN_W = 220;

    let dragging = false, startX = 0, startW = 0;

    handle.addEventListener('mousedown', (e) => {
      dragging = true;
      startX   = e.clientX;
      startW   = panel.offsetWidth;
      handle.classList.add('dragging');
      overlay.classList.add('active');
      e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
      if (!dragging) return;
      const maxW  = Math.floor(window.innerWidth * 0.7);
      const newW  = Math.max(MIN_W, Math.min(maxW, startW + (startX - e.clientX)));
      panel.style.width = newW + 'px';
    });

    document.addEventListener('mouseup', () => {
      if (!dragging) return;
      dragging = false;
      handle.classList.remove('dragging');
      overlay.classList.remove('active');
    });
  }

  /* ── Auto-run on load ──────────────────────────────────────────── */
  await runCode();
});
</script>
